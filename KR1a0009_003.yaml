body:
  text: 周易口訣義卷三唐史徴撰上經三噬嗑至離震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也象曰雷電噬嗑先王以明罰勑法初九屨校滅趾無咎象曰屨校滅趾不行也六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也六三噬臘肉遇毒小吝無咎象曰遇毒位不當也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也上九何校滅耳凶象曰何校滅耳聰不明也噬嗑亨利用獄者噬嚙也嗑合也喻人口中有物則隔人隔塞正法使正法不行如口中有物間嚙而必通刑去姦邪正法無礙故曰利用獄也象曰雷電噬嗑雷動而威電照而明明動相合故曰噬嗑也先王以明罰勑法者勑整理也謂先王以明鑒之德刑罰兼施整齊法度也初九履校滅趾無咎者屨猶履也滅沒也趾足也初九既居無位之地是受刑之人罪之尚微者也若能于是時著械沒其趾足而因懲戒爾後改行修德故終身無咎故云小懲大戒此小人之福也六二噬膚滅鼻無咎二為得位處中所刑者當故曰噬膚滅鼻膚是柔脆之物喻伏罪之人然乘剛用刑即刑人深矣噬過其分以至滅鼻雖復過深而所刑者當故曰無咎六三噬臘肉遇毒小吝無咎者以隂處陽不正行刑罪人不伏怨生而不乘剛不失順道雖有小吝於義無咎故曰小吝無咎也噬喻刑人臘喻不伏毒喻怨生九四噬乾胏得金矢利艱貞吉者九四以陽失位不正行刑罪人不伏故曰噬乾胏乾胏肉之乾者得金矢利艱貞吉金剛也矢直也雖刑不伏物而能得其剛直也既剛且直又利艱固不失其正可以獲吉也六五噬乾肉得黃金貞厲無咎位既不正有所刑人人亦不伏猶如噬嚙乾堅之肉物所以難噬也得黃金貞厲無咎者黃中也金剛也以其居中履剛得其剛正之道剛勝也位既不正刑戮得當然則居貞以危亦免咎也上九何校滅耳凶何擔何也校枷鎖也滅沒也上九喻人積惡之極不能懲改須至擔何枷鎖以沒其耳將至誅滅之凶故云惡積而不可掩罪大而不可解也離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政無敢折獄初九賁其趾舍車而徒象曰舍車而徒義弗乘也六二賁其須象曰賁其須與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也上九白賁無咎象曰白賁無咎上得志也賁亨小利有攸往者賁飾也以剛柔交雜而相文飾也象曰山下有火賁王廙云山下有火文明相照夫山之為體層峰峻嶺岩巒峭麗參差被日光照耀如以雕飾而見文章賁之象也君子以明庶政無敢折獄庶衆也敢果也折斷也君子以明鑒之德必須審察為衆庶之政無直果敢折斷獄訟當審慎用刑也初九賁其趾舍車而徒者趾足也處無位之地不尚華侈所飾在于足趾故曰賁其趾以其執志耿介不乘不義之車而從有義徒步故曰舍車而徒也六二賁其須須鬚也與三相近情意相得以下親上猶如鬚之附面修其所理隨之興動故小象云與上興也九三賁如濡如永貞吉者與二相得以飾以潤故曰賁如濡如也以其非應相親永保其正物莫能犯故曰永貞吉也六四賁如皤如白馬翰如匪寇婚媾者四應在初被三隔礙志唯猶豫或文或素故曰賁如皤如質素也既不得前進但鮮潔其馬翰如徘徊以待之矣故曰白馬翰如也若非九三與己為寇難即與初已為媾婚故曰匪寇婚媾也六五賁于丘園束帛戔戔吝終吉者處得尊位為飾之主不尚華飾所賁質素故其致飾如似丘園丘園所生草木質素而已則不縻費國之盈盛乃束帛珍寶戔戔衆多故曰賁于丘園束帛戔戔若能儉而約侈費用得宜處約之吝乃得終吉故曰吝終吉也上九白賁無咎者處飾之終終乃反素矣他人以色為飾而我以素為飾守志任真得其夲性何咎之有哉坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也象曰山附于地剝上以厚下安宅初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也六三剝之無咎象曰剝之無咎失上下也六四剝牀以膚凶象曰剝牀以膚切近災也六五貫魚以宫人寵無不利象曰以宫人寵終無尤也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也剝不利有攸往者剝落也以隂剝陽以小人損君子是小人道長君子道消小人侵害君子故君子不利有攸往象曰山附于地剝者山本高峻今附于地是剝落之象也上以厚下安宅者宅人居者也剝之為體自下而起為乾從初九而至剝也即是小人在下而起上侵于君子君子即可敦厚為德制伏下人各令安其居也初六剝牀以足蔑貞凶蔑削也牀者人所安之物也今剝道自下而起似侵剝牀足人漸不安處削除中正之道所以凶也六二剝牀以辨蔑貞凶是牀梐之間牀足之上分辨之處也剝之漸盛削不已至于牀梐之間分辨之處削去正道正道陵夷所以凶也六三剝之無咎衆皆剝陽唯六三與上九相應是獨親狎于君子雖當剝時可以無咎也六四剝牀以膚凶牀既削盡以至人膚身體被其侵剝切近于災故為凶矣六五貫魚以宮人寵無不利者獨處于尊為剝之主衆隂皆歸駢頭相次如貫穿之魚小人得寵以消君子若接待衆隂而似宫人在內未能害于外政矣既不預政事故云無不利也上九碩果不食君子得輿小人剝廬者處剝之上獨處不落猶碩果之不食若君子處于此位似車輿運載下人令其獲安故云君子得輿民所載也小人處此上位即侵削下人廬舍民何以安故曰小人不可用為君長故曰小人剝廬終不可用也震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎象曰雷在地中復先王以至日閉關商旅不行后不省方初九不逺復無祇悔元吉象曰不逺之復以修身也六二休復吉象曰休復之吉以下仁也六三頻復厲無咎象曰頻復之厲義無咎也六四中行獨復象曰中行獨復以從道也六五敦復無悔象曰敦復無悔中以自考也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰速復之凶反君道也復亨者復是歸本之名靜默為義故老子云歸根曰靜是謂復命也陽氣反復所以亨通故曰亨也出入無疾朋來無咎者出則剛長入則陽復理會其時故無疾朋謂衆陽以陽氣漸長衆陽朋聚而來故無咎反復其道七日來復者反之與復理㑹其宜故曰反復其道陽氣滅絶之後不過七日陽復生來故云七日來復利有攸往以陽氣漸盛陰柔乃消故利有所往象曰雷在地中復以靜默為義雷本動物今在地中靜默之象先王以至日閉關商旅不行后不省方者方事也先王于至之日閉塞視聽不親其事商旅不行道路在於君后亦不省察四方之事也初九不逺復無祇悔元吉祇大也最處復初初知福之機不為迷逺尋能求復歸於善道故無大悔而終獲大吉也六二休復吉處復之時近初之陽是親仁善鄰既親賢德之行而獲休美之吉六三頻復厲無咎頻蹙之貌也六三去復已逺雖勝上六之迷暗猶可頻蹙而復於危厲之中而得無咎也六四中行獨復獨應於初即是棄惡歸善處四隂之中獨得善道故曰中行獨復六五敦復無悔者敦厚也處尊位以敦厚之德而能考成其行故無悔而已也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征者上為最處復後是迷暗而更求復也以迷求復去善既逺必致凶災故曰迷復凶有災眚用此迷暗之人興行師旅終有大敗若用於其國內即反違君道故曰用行師終有大敗以其國君凶也縱使修身改悔至于十年猶不能征進矣故曰至于十年不克征傷害曰災妖祥曰眚震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉象曰天下雷行物與無妄先王以茂對時育萬物初九無妄往吉象曰無妄之往得志也六二不耕穫不菑畬則利有攸往象曰不耕穫未富也六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也九四可貞無咎象曰可貞無咎固有之也九五無妄之疾勿藥有喜象曰無妄之藥不可試也上九無妄行有眚無攸利象曰無妄之行窮之災也乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也象曰天在山中大畜君子以多識前言往行以畜其德初九有厲利己象曰有厲利己不犯災也九二輿說輹象曰輿說輹中無尤也九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也六四童牛之牿元吉象曰六四元吉有喜也六五豶豕之牙吉象曰六五之吉有慶也上九何天之衢亨象曰何天之衢道大行也大畜利貞者艮止于上乾剛前進不得通故曰大畜也柔能制剛非正不可故曰利貞也不家食吉有大畜之財常須養贍賢人使賢德食祿非食自家之食也利涉大川者豐財養賢是合天之道應人之心故可濟涉大川不懼沉溺也象曰天在山中大畜者艮山上止乾陽不得通故曰大畜也君子以多識前言往行以畜其德者君子識前代人言往哲之行使多聞多見以畜積而為己德也初九有厲利己己止也初欲前進遇四畜盛若進即有危厲若休已不進即有所利故曰有厲利己九二輿說輹處畜之盛不可前進進而不已則輿說輹敗不可以行然九二有居中之德不妄前進豈有過尤哉九三良馬逐利艱貞曰間輿衛利有攸往者夫大畜者先畜後通今處乾之上畜道見通可以升進以上九有尚賢之德而不拒於九三三可以乘其壯馬馳騁而來故曰良馬逐途路近通而未全泰宜艱固而守貞正故曰利艱貞曰間輿衛者間礙也衛護也雖日日見有人間礙于輿此則人之助已乃是防衛見護也何衢既通小為阻礙故無妨攸往六四童牛之牿元吉童牛一嵗之牛其角如繭栗處艮之下是畜之首畜道將盛初既止而不進故六四可以童牛之角而止牿于初以柔制剛以息強爭非惟獲其大吉而亦有喜慶也六五豶豕之牙吉者豕牙橫猾難制之物謂九二也九二前進如豕之牙五處畜盛而能制之故豶制其牙使不前能止強暴非惟獲勝乃得吉慶故云有慶上九何天之衢亨者處畜之極何須更畜途徑大通無復為礙衢者四達之路爾雅云四達謂之衢是也震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉象曰山下有雷頤君子以慎言語節飲食初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也六二顛頤拂經于丘頤征凶象曰六二征凶行失類也六三拂頤貞凶十年勿用無攸利象曰十年勿用道大悖也六四顛頤吉虎視耽耽其欲逐逐無咎象曰顛頤之吉上施光也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也頤貞吉者頤養也養正則吉故曰頤貞吉也觀頤者謂在下之人觀其君上所養之人若所養之人賢良即能助君行化也自求口實者謂其自養求其口中之實物飲食不節患必生焉故荀爽云飲食失宜患之所起是也象曰山下有雷頤者艮止於上雷動於下猶人口動咀嚼飲食皆下動上止頤之象也君子以慎言語節飲食者啓發言語榮辱之階不可不慎飲食過傷患之所起不得不節也初九舍爾靈龜觀我朵頤凶者靈龜謂神靈明兆之物喻己之明德朵猶動嚼也喻貪婪躁求食祿之人當養賢之初不能修德待用而貪羡它人躁欲求之如舍己明德貪竊躁求所以凶也六二顛頤拂經于丘頤征凶者顛倒也謂倒下養初也拂違也經猶義也丘所履之常凡頤養之道只合以下養上今既倒下養初即是違於經義所履之常以此而養所行必凶故曰頤征凶也六三拂頤貞凶十年勿用無攸利者頤養之體貴於守正今六三以隂居陽是納上以諂媚也既為諂行違養之道是正之凶矣雖復十年猶未可見用故無施而利故曰無攸利也六四顛頤吉虎視耽耽其欲逐逐無咎者耽耽威肅也逐逐敦實也以上養下所養賢人故曰顛頤吉也親德養賢也不可以慢必須威而不猛如虎之視近志逺雖不怒而有威又須寡欲少求情志逐逐修此二德是頤養之美故無咎也六五拂經居貞吉不可涉大川者以隂居陽而位不正是違經義若居之能守貞正即吉以不正之身而處尊位故不利涉大川也上九由頤厲吉利涉大川者四隂皆宗歸上莫不由上九而養之故曰由頤也為衆隂之主又非其尊位不可以慢故嚴厲乃得吉故曰厲吉為衆之主既能嚴正即物不敢違故利涉大川也巽下兑上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遁世無悶初六藉用白茅無咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不撓乎下也九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也上六過涉滅頂凶無咎象曰過涉之凶不可咎也大過者謂過越也衰亂之世德大之人過越常分以拯患難故曰大過也棟橈者棟謂屋棟也橈弱也曲也衰亂之世始終皆弱也利有攸往亨者謂德大之人挺身救難維持叔世往必亨通象曰澤滅木大過者滅沒也澤水也如水泛溢以至沒木亦如小人過越常分也君子以獨立不懼遁世無悶者此論國之大柄故先儒於此不敢梗槩而言也謂君子欲有救難之心卓爾獨立無所憂懼不然逃遁避世而心無憂悶也初六藉用白茅無咎者以柔處下苟能恭肅不怠而用潔白之茅置羞於地謹慎如此雖遇大過之難而亦無咎也九二枯楊生稊老夫得其女妻無不利者以陽處隂是拯難之人又無偏應而無私黨猶如枯槁之楊更生稊穗所益久也衰老之夫得其少妻可有後嗣也救難既多所濟𢎞廣故無所不利也九三棟橈凶者以陽處陽不能拯救危難又應於上有偏係之心故棟折榱崩而致凶也九四棟隆吉有它吝者以陽處隂猶有救難之心故棟得隆起也獨應於初心不𢎞廣救難褊狹故有它吝九五枯楊生華老婦得其士夫無咎無譽者以陽居陽不能拯救衰難以其居尊未即橈弱猶如枯槁之楊雖復生華尋見衰落亦猶衰老之婦而得少壯之夫即不能有益也以其處得尊位才得免咎而已既不能拯救於人故無聲譽之美故曰無咎無譽也上六過涉滅頂凶無咎者處大過之極是救難過甚遂滅頂也為救時之苦身至喪亡深可哀而嗟之又何有咎也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉象曰水洊至習坎君子以常德行習教事初六習坎入于坎窞凶象曰習坎入坎失道凶也九二坎有險求小得象曰求小得未出中也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也九五坎不盈祗既平無咎象曰坎不盈中未大也上六係用徽纆置于叢棘三嵗不得凶象曰上六失道凶三嵗也習坎者習為便習也坎險陷也夫險難之事非經便習不可以行故加習坎之字有孚維心亨者維于險難之中而有剛中之質故其孚信維係于心所以通也行有尚者內心剛正信實不失以此而行人所尊尚也象曰水洊至習坎者洊因仍也雨水因仍相洊而至故重險君子以常德行習教事者王君云至險未夷教不可廢維處險難之中以恆常德行習修政教之事故莊氏云雖處急難之時道教豈可忘哉是也初六習坎入于坎窞凶者習坎猶其始習險事窞坎底也處坎之底無人救援失道而窮所以凶也九二坎有險求小得者實德無應猶處險中故曰坎有險也與初三相近緣初三隂柔皆是小人不足以為大援故只可求小得也六三來之坎坎險且枕入于坎窞勿用者位既不正又居兩坎之間來之與往皆入于坎故曰來之坎坎也枕者不安之貌出即無應居又不安故曰險且枕也往來皆危入于坎底故曰入于坎窞也失位無應雖復往來徒勞而已故曰勿用也六四樽酒簋二用缶納約自牖終無咎者以柔得位上奉于君君臣相親時明信顯著雖復一樽之酒二簋之食而用瓦缶為此儉約進獻于牖明德惟馨故終無咎也九五坎不盈祗既平無咎者獨陷難中而無救助是無匡弼之臣故曰坎不盈也身處尊位不可安然必須釋難濟時使天下安平乃得無咎故書云其爾萬方有罪在豫一人是也上六係用徽纆置于叢棘三嵗不得凶者徽纆猶墨索也上六處險之極即是犯于嚴法之人遂乃以徽墨之繩而係縳之置于叢棘之中令其思過矣虞氏云以置九棘取改過自新故曰係用徽纆置于叢棘也若置之九棘之中而不能改過自新必致罪咎故曰三嵗不得凶也離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也象曰明兩作離大人以繼明照于四方初九履錯然敬之無咎象曰履錯之敬以辟咎也六二黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也九四突如其來如焚如死如棄如象曰突如其來如無所容也六五出涕沱若戚嗟若吉象曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也離利貞亨者離麗也柔著于中正柔而處中恐陷邪諂邪諂則不獲亨通故須利貞正後乃得通故利貞亨麗猶著也如出著于物也畜牝牛吉者畜養也牛者外強內順然離之為體故不可養剛猛之物則可畜養牝牛牛者順從之物而又牝焉象曰明兩作離者上下重明相照故云明兩作離也故東宫有重明門欲令太子續于明也大人以繼明照于四方者繼明猶緝熙之義初九履錯然敬之無咎者履而錯然謂不安之貌也初九處無位之地心常不安常慮危害若能恭敬為本以避于害即得無咎故曰敬之無咎也六二黃離元吉者黃中色也離文明也得黃中之色而又處文明故復大吉也九三日昃之離不鼓缶而歌則大耋之嗟凶者處下卦之上如日昃之離喻人中年以上可委政于人求已之樂鼓缶而歌樂天知命而已若不知天命獨親執政事至于耋老嗟怨無益所以凶也九四突如其來如焚如死如棄如者三處下離已沒之際四為上離始出之初突如始出忽然而來故曰突如其來如欲進炎而焚于君故曰焚如以臣害君命必不全故曰死如也違于臣節衆之所棄故曰棄如也六五出涕沱若戚嗟若吉者隂居陽位不勝所履四為逆首欲來害己若其出涕沱憂戚嗟如此戒懼為衆所助乃得吉也上九王用出征有嘉折首獲匪其醜無咎者處離之極離道已盛則須除其非類以去民害故王用出征伐必有嘉美之功折斷罪人之首獲得非類者始可免咎以處窮極之地當須去民之害乃得無咎故曰獲匪其醜無咎也醜類也周易口訣義卷三
