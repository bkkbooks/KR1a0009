body:
  text: 周易口訣義卷二唐史徴撰上經二履至觀兑下乾上履虎尾不咥人亨彖曰履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也象曰上天下澤履君子以辨上下定民志初九素履往无咎象曰素履之往獨行願也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也九四履虎尾愬愬終吉象曰愬愬終吉志行也九五夬履貞厲象曰夬履貞厲位正當也上九視履考祥其旋元吉象曰元吉在上大有慶也履虎尾不咥人亨者履禮也踐也故先儒云統之于心曰體踐而行之曰履夫禮尚卑謙今六三以柔乗剛違謙越禮如履踐虎尾言其危懼之甚也不咥人亨者咥嚙也雖復履踐虎尾以其悦奉于剛正之徳所以不被咥嚙而得亨通也象曰上天下澤履君子以辨上下定民志者天尊澤卑各得其序故曰履禮之象也君子以分辨上下君臣有禮正定人民志意使尊卑有别也初九素履往无咎者禮貴儉約今初九處履之初不尚華飾以質素為用既行其禮以素可以往而无咎矣九二履道坦坦幽人貞吉者坦坦平易之貎九二陽居隂而用卑巽往之于應途路平坦無所險厄故曰履道坦坦也在内履中謙巽以行不以處内為屈居外為榮是幽隠之人而不失貞正之道故曰幽人貞吉也六三眇能視跛能履履虎尾咥人凶武人為于大君者以隂居陽不行謙巽之道猶如眇目之人所視不明也跛足之人所行不能逺也既無謙巽之行則為物害猶如履踐虎尾必見咥嚙所以凶也以微劣之軀而欲行其剛武為于大君是凶頑之甚故曰武人為于大君也九四履虎尾愬愬終吉者子夏傳愬愬恐懼之貎也九四逼近至尊心之憂懼若蹈虎尾而愬愬恐懼故書云若蹈虎尾涉于春氷是也以陽居隂用之謙巽上奉于君故終吉也九五夬履貞厲者夬決也為履之主裁之以義正之以禮故以剛決貞故曰夬履貞厲也然以陽居尊滿之道矣禮尚謙虚而以盈滿為用是危厲者也上九視履考祥其旋元吉者考是察也祥謂禎祥也旋反也上九處履之極能察禍福禎祥也又能視其所履踐之徳行不為驕怠而能旋反行禮以應尊卑施惠向下故獲大吉也乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也象曰天地交泰后以財成天地之道輔相天地之宜以左右民初九拔茅茹以其彚征吉象曰拔茅征吉志在外也九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰小往大來吉亨者泰是通泰之名以天地交感萬物長育故名泰也隂氣消故曰小往陽氣長故曰大來以天地通泰君子道長小人道消以此吉而亨通矣故曰吉亨也象曰天地交泰者天氣降下地氣騰上上下交感萬物資育故是通泰之象也后以財成天地之道輔相天地之宜以左右民者后君財裁也剪也道不失其宜即是春生秋殺各有宜也相助也謂助天地所宜之物五土所生各以其時也左右者助也謂左右羣臣助君之化也裁成天地發育所生之宜欲明通泰之時助天地之化非南面之君不可以施其化成天地之功也初九拔茅茹以其彚征吉茹相牽引之貎也夫通泰之道天氣下降地氣上騰三陽皆欲上升初為三陽之首若行則衆類從之猶似拔其茅根以相連茹以其三陽之類隂不敢拒所以征進而獲吉矣九二包荒用馮河不遐遺朋亡得尚于中行者包含也荒穢也馮河是无舟渡水馮陵于河此頑愚之人也言九二以剛取中心又通泰即物无不納雖復荒穢之物頑愚之人悉皆包含不計遐逺无所棄遺故曰包荒用馮河不遐遺也心既𢎞大无偏无黨即不私於朋友天下皆悉納之故曰朋亡也亡无也謂无私於朋友得尚乎中行者尚配也中行君也此九二既備衆徳无物不納即可以配于君位下治天下也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福者陂險陷也復反也九三處天地之際當通泰之時天氣降下地氣騰上今泰道將極否道却至即天氣上升地氣下復猶似平路必致崩䧟如暫往必有反復故曰无平不陂无往不復也時既變革必致危殆當須艱固其志守正不回乃得无咎故曰艱貞无咎衆皆同志已去即從故不須憂恤而同其信故曰勿恤其孚誠信既施徳澤歸矣自獲福慶故曰于食有福六四翩翩不冨以其鄰不戒以孚者翩翩者飛動之貎也六四處坤之首衆隂皆随之故六四翩翩飛動歸于下故曰翩翩泰道既極坤復其體衆皆志願同歸于下六四若行五之與上皆相随從故六五上六不待六四與之財相誘故曰不冨以其隣也鄰皆願下而不待賙贍衆願同行故不假戒告而自孚信故曰不戒以孚也六五帝乙歸妹以祉元吉歸妹猶言嫁妹也以五貴位降徳就二猶似帝王嫁妹于二故曰帝乙歸妹也處通泰之時天地交好以帝王之妹降于庻人得配匹之宜盡通泰之道故獲祉福而得大吉也故曰以祉元吉祉福也上六城復于隍勿用師自邑告命貞吝者隍城塹也處通泰之時上下相扶君臣和順猶似當初以土相培而就其城今泰道已極否道至即是城之崩倒却至于塹故曰城復于隍也否道既至敎令不行故不煩用師假使歸其已邑告戒令命亦皆不從是正之賤矣故曰勿用師自邑告命貞吝也坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也象曰天地不交否君子以儉徳辟難不可榮以禄初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也六二包承小人吉大人否亨象曰大人否亨不亂羣也六三包羞象曰包羞位不當也九四有命无咎疇離祉象曰有命无咎志行也九五休否大人吉其亡其亡繋于苞桑象曰大人之吉位正當也上九傾否先否後喜象曰否終則傾何可長也否之匪人不利君子貞者否以上下不交君臣不孚故為閉塞之義也當否塞之時小人道長非是君子徳通之時故曰匪人也小人侵陵君子邪道乃興故不利君子而為正故曰不利君子貞也象曰天地不交否者天氣上地氣下二氣不相交通故曰否閉之象也君子以儉徳避難不可榮以禄者言君子當否閉之時不可處寵求安故以節儉為徳避于小人之難不可榮其身食以禄也初六拔茅茹以其彚貞吉亨者夫柔之為道必依于剛弱之為道必親于强故獨處須託之以君子今初六體既柔劣不事干進但以衆類親比于上既不往謟守正應上所以獲正之吉也六二包承小人吉大人否亨者六二以柔順之質但施包納承順于君故曰包承也處否閉之時是小人道長故小人獲吉大人當否閉之時雖復小人為亂但防之以道遏絶小人所以獲亨通也故曰大人否亨也六三包羞者葢恥辱也六三以謟媚之身而為小人之行所為之事皆包羞恥故也九四有命无咎疇離祉者夫君子親于小人則有恥累至焉今九四若有招命于初是親于小人禍咎必至只為初六修正不敢為謟故九四命之則无咎故曰有命无咎既有招命初六初六必當受福故曰疇離祉也疇初也謂初六離著也祉福也謂九四命之因此招命得其福也九五休否大人吉其亡其亡繋于苞桑者休美也處否閉之時而居尊位以休美之徳悦諭小人使小人不妄為非故曰休否也有斯美徳悦服小人若非大徳之人拯世之君即不能獲吉故曰大人吉也以小人道長之時恐有危亂及身故丁寜戒懼慮其滅亡再言之者憂懼之甚故云其亡其亡也既慮危亂故必繋于苞桑之固矣苞本也桑者根多固有牢固之義故曰繋苞桑也上九傾否先否後喜者處否之極泰道將至故傾棄其否以至通泰故曰傾否先塞後通故後有喜慶故曰先否後喜也離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志象曰天與火同人君子以類族辨物初九同人于門无咎象曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也九四乗其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也上九同人于郊无悔象曰同人于郊志未得也同人于野亨者同人者謂和同于人故曰同人也既與人同若不廣逺即不能𢎞博矣野者曠野之所喻其與人相同必須廣逺无所不通故曰同人于野亨也利涉大川利君子貞者既與人同不憂患難雖大川亦能濟涉故曰利涉大川也與人和同若不以正則是同于邪妄之道故曰君子相同利以為正利君子貞象曰天與火同人者天體高火炎上即火勢上逼以同于天喻己之同于人也君子以類族辨物者族聚也辨分也物事也君子以類而聚君子小人如有所同又須分辨事物各處其道也初九同人于門无咎者初九志既𢎞廣不拒于物出門與人同即无人與之為咎也六二同人于宗吝者六二専志在五所與人同其意􅄶狹是鄙吝之道也九三伏戎于莽升其高陵三嵗不興者與二相近而欲親二故盜憎其主惡于五所以潛隠兵戎于草莽之中將以襲五故曰伏戎于莽也時升高陵以望前敵故曰升其高陵以九三之臣而欲拒九五之君勢不可敵也縱三年亦不能興起兵衆以侵害于君故曰三嵗不興也九四乗其墉弗克攻吉者三處下卦之極似乗墉墻而不能克敵矣困罷乃反以改過修其徳乃獲吉也九五同人先號咷而後笑大師克相遇者九五所應在二隔于三四不得其應合乃悲泣也三四是臣而五是君以臣拒君力不可敵後乃與二相遇故後笑不能以服物而以興舉師旅乃克以明失同人之徳也上九同人于郊无悔者獨處于外與人和同在于郊境之外也内无其應无所陵競未得和同之志但无悔而已乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨象曰火在天上大有君子以遏惡揚善順天休命初九无交害匪咎艱則无咎象曰大有初九无交害也九二大車以載有攸往无咎象曰大車以載積中不敗也九三公用亨于天子小人弗克象曰公用亨于天子小人害也九四匪其彭无咎象曰匪其彭无咎明辨晳也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也上九自天祐之吉无不利象曰大有上吉自天祐也大有元亨者柔處尊位不拒于物羣陽並應大為所有故稱大有故老子云江海所以能為百谷王者以其善下也元亨者能包容萬物則大得亨通也象曰火在天上大有君子以遏惡揚善順天休命者火是日如日在天上无所不照无逺不燭是大有之象也君子當須遏匿人之過惡稱揚人之徳善又須順天之道休美萬物之性命是好生惡殺之義也初九无交害匪咎艱則无咎者處大有之初不能履中謙柔必至驕盈陵物故戒之即日雖无交切之害後必將至若欲免其凶咎當須艱固不盈即得无咎也九二大車以載有攸往无咎者以剛居中而應于五為君委任即是持正之臣任重専權猶如大車所載非少體既剛强不懼傾敗謂車材强壯以斯而往何咎之有故曰大車以載有攸往无咎也九三公用亨于天子小人弗克者公謂臣之貴極也九三以剛健盛極權臣之象也若以賢良處之即得亨于天子助化之道也若以小人處之禍害立至故曰小人弗克也九四匪其彭无咎者彭旁也謂去三之旁而從于君也九四逼近九三三是權臣威權之盛所以九四欲舎九五而從九三舎君事臣違于常理若能棄三旁而歸于五即得无咎也六五厥孚交如威如吉者以柔處尊志又𢎞大體柔即和順于物居中即所納不遺羣賢悉歸信接于下故不言之化而敎自行不令之威而人皆服自然獲吉何難何防任之得人故易而无備矣上九自天祐之吉无不利者居大有之時而不履位尚賢也餘皆乗剛而上九獨乗柔順思順也五有信徳而親比焉是履信也有此三徳故從天以下皆祐助之而得其吉无所不利也艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也六二鳴謙貞吉象曰鳴謙貞吉中心得也九三勞謙君子有終吉象曰勞謙君子萬民服也六四无不利撝謙象曰无不利撝謙不違則也六五不冨以其鄰利用侵伐无不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也謙亨者謙是屈己先人以自卑巽為用如是何往而不亨也君子有終者小人行謙多不能久惟有君子盡能保終也象曰地中有山謙者九家易義曰山至高地至卑以高下卑故云謙也所以言地中者以明多之與少俱行其謙也君子以裒多益寡稱物平施者裒聚也寡少也謂人資財此多者行謙即物益裒聚故曰裒多也比寡少行謙即物漸増益故曰益寡也稱量事物随其多少均平而施給故曰稱物平施也初六謙謙君子用涉大川吉者處謙更在下則是卑退之甚也故曰謙謙也君子以謙自牧守謙不失用濟大難物无見害故曰用涉大川吉牧養也六二鳴謙貞吉者鳴者聲名聞之謂也處謙之時位居中正即謙之聲聞于外境是正而獲吉故曰鳴謙貞吉九三勞謙君子有終吉者九三以剛陽之質為一卦之主上即承奉于君下又撫綏萬人勞勤于謙以君子處之能保其終而獲吉六四无不利撝謙者六四上近至尊下近權臣處是時不可違于謙巽故三之於五有事指撝无不從順不敢違于法則故曰无不利撝謙也六五不富以其鄰利用侵伐无不利者六五為謙之君敎化大行下既行謙人自富貴故不假以財物賙贍于鄰故曰不富以其鄰身既謙卑不妄加討伐若有驕逆不行此道者故用誅伐故云利用侵伐无不利張氏云葛伯仇餉湯往伐之是也上六鳴謙利用行師征邑國者不預内政于謙不實惟有虚聲外揚而已故曰鳴謙也有所興為其功未得但可征旁邑國驕逆之人故曰利用行師征邑國也坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考初六鳴豫凶象曰初六鳴豫志窮凶也六二介于石不終日貞吉象曰不終日貞吉以中正也六三盱豫悔遲有悔象曰盱豫有悔位不當也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也六五貞疾恒不死象曰六五貞疾乗剛也恒不死中未亡也上六㝠豫成有渝无咎象曰㝠豫在上何可長也震下兑上随元亨利貞无咎彖曰随剛來而下柔動而説随大亨貞无咎而天下随時随時之義大矣哉象曰澤中有雷随君子以嚮晦入宴息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也六二係小子失丈夫象曰係小子弗兼與也六三係丈夫失小子随有求得利居貞象曰係丈夫志舍下也九四随有獲貞凶有孚在道以明何咎象曰随有獲其義凶也有孚在道明功也九五孚于嘉吉象曰孚于嘉吉位正中也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也象曰山下有風蠱君子以振民育徳初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也九二幹母之蠱不可貞象曰幹母之蠱得中道也九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也六五幹父之蠱用譽象曰幹父用譽承以徳也上九不事王侯高尚其事象曰不事王侯志可則也蠱元亨利渉大川蠱事也謂創制立法有為之事也敎化必大通故曰元亨也立法施令大行故曰利涉大川也先甲三日後甲三日者甲創制之始故創令立法先三日恐人未曉殷勤告示云後甲三日如此再三丁寜宣布此後犯者必誅使民无怨乃得无咎也象曰山下有風蠱者先儒云蠱惑也按春秋女惑男風落山謂之蠱既有惑亂當以敎事制之非是蠱訓為事亦猶風行山下惑亂萬物姦在人間惑亂衆庶故以敎法齊之也君子以振民育徳者君子以振濟人民象風之散布育養其徳象山之安静也初六幹父之蠱有子考无咎厲終吉者考是父妣是母此即先儒通稱也初六處事之初即能幹成父事故曰幹父之蠱也子能幹了家事父又何憂父能无慮故曰有子考无咎也治家之初恐有危厲而能幹濟家事克終父命故曰厲終吉也九二幹母之蠱不可貞者以陽居隂而又處中女人以内為本故曰幹母之蠱也女人之性情多狠戾故不可全為正故云不可貞九三幹父之蠱小有悔无大咎者以陽居陽處一家之剛正能幹濟父事故曰幹父之蠱為无其應即不可以行故小有悔吝能堪家事即終无大咎矣六四裕父之蠱往見吝者裕寛也以隂得位寛猛得宜即是能容裕父之蠱也亦是无應而行人所不親故曰往見吝也六五幹父之蠱用譽者幹事得至尊位是能幹辦父事承先之徳故有美譽于外孝經云立身行道揚名于後世以顯父母是也上九不事王侯高尚其事者最處事上是能高尚其名不覊其身但可清虚守道不事君侯衆多敬仰故曰高尚其事也兑下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也象曰澤上有地臨君子以敎思无窮容保民无疆初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉无不利象曰咸臨吉无不利未順命也六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也六四至臨无咎象曰至臨无咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也上六敦臨吉无咎象曰敦臨之吉志在内也臨元亨利貞者臨大也以陽氣方長萬物皆盛亦猶王者盛大之徳威臨于下故稱臨也凡物盛之時能備四徳故曰元亨利貞也至于八月有凶者夫盛極必衰自然常理臨為盛大之卦故以垂戒之言凶者臨卦是建丑之月卦陽氣方長至及八月即四隂已長四陽却退小人道長君子道消也故曰八月有凶也象曰澤上有地臨者是以大臨小以高臨下之義也君子以敎思无窮容保民无疆者凡為君長以臨當須敎化思念无有窮已又須含容保愛民人人即歸徳邊境不計逺邇也初九咸臨貞吉者咸感也以陽感應于隂相感而臨志行其正故曰貞吉也九二咸臨吉无不利者以陽應隂相感而臨也二是剛陽五是柔隂若全順于五則剛徳全損全與相違又失感應之道必須量時進退如君臣獻可替否之義故得吉无不利六三甘臨无攸利既憂之无咎者以隂居陽即是越隂柔之道小人之行也甘謂言辭甘美邪佞不正之名也六三以邪謟之行以臨于物患必生焉故无施而利故曰甘臨无攸利若能恒憂其危改過自新乃得无咎故曰既憂之无咎也六四至臨无咎者以隂應陽不懼剛長以至極之善而應臨于初乃得无咎也六五知臨大君之宜吉者以柔處尊納剛以禮不以威武是用而知臨于物如似大君之宜所以獲吉也上六敦臨吉无咎者敦厚也處坤之極即是敦厚以為臨也處于上體志在尊賢故獲吉也坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設敎而天下服矣象曰風行地上觀先王以省方觀民設敎初六童觀小人无咎君子吝象曰初六童觀小人道也六二闚觀利女貞象曰闚觀女貞亦可醜也六三觀我生進退象曰觀我生進退未失道也六四觀國之光利用賔于王象曰觀國之光尚賔也九五觀我生君子无咎象曰觀我生觀民也上九觀其生君子无咎象曰觀其生志未平也觀盥而不薦者觀謂王者道徳民所觀看也盥謂瓶罍灌洗之器物也薦謂籩豆陳薦之屬也今所觀王者施瓶盥之禮為民祈福還威儀嚴敬否故不觀陳薦之物也有孚顒若者孚信也顒是嚴整之貎謂君子行禮潔信立誠端敬顒然若鬼神在則下觀其徳民順其化故詩云顒顒卬卬如珪如璋君徳之義也象曰風行地上觀者風如王者風敎行于地上人所觀也先王省方觀民設敎者先王以省視萬方觀看民俗施設敎化故鄭衆云從俗所為順民之敎故君子治人不求變俗是也如封太公於齊五月報政為簡其君臣禮從俗不同伯禽于魯變其俗易其禮三年報政也初六童觀小人无咎君子吝者觀之為體下賤上貴也最處于下而不近朝廷之美所觀􅄶狹如童稚之見故云童觀也大觀之時若如是乃小人之見纔得无咎君子居之深可鄙吝也六二闚觀利女貞者居内處中所見非大猶闚竊而觀望此乃利女之正非丈夫之正處大觀之時而為闚竊觀看誠可醜也六三觀我生進退者生猶道也六三處下卦之上是可進之時居上卦之下又是可退之地處此之時可以觀風相幾而不失其道也六四觀國之光利用賔于王者處近君之尊故可觀國之光華矣習國家之禮儀故可利為王賔也九五觀我生君子无咎者居得尊位為觀之主四海之内皆由我化我化若善天下習君子之風我化不善天下有小人之俗故我觀之道有君子之風著又何有咎也上六觀其生君子无咎者觀其生則是為人所觀者也最上處極為天下所觀于已之道若能自戒慎高尚其事著君子之風故得无咎王傳云獨處異地不易執持此明上九但卓立其身異于塵俗何咎之有故論語云君子之過如日月之食過也人皆見之更也人皆仰之周易口訣義卷二
