body:
  text: 周易口訣義卷五唐史徴撰下經二夬至艮乾下兌上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬决也剛決柔也健而説决而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也象曰澤上于天夬君子以施禄及下居德則忌初九壯于前趾往不勝為咎象曰不勝而往咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九五莧陸夬夬中行无咎象曰中行无咎中未光也上六无號終有凶象曰无號之凶終不可長也夬揚于王庭者夬决也陽長至五上六一柔而乘五剛以人事喻猶小人乘陵君子而為不順衆共決之故曰夬也以剛決柔以君子除小人以剛正之德去邪謟故可顯然于王者之庭發揚決斷之事示公正而无私隱故曰揚于王庭王庭亦公庭也孚號有厲者號號令也厲危也以剛正之德而行孚信號令施決斷之事即上六之柔亦喻邪謟小人憂危之理分明可見矣告自邑不利即戎者夫興師動衆必擾國亂人今上六一柔既乘剛不順更喻小小之人要除只可獨行決斷不必更興師旅故不利即戎也利有攸往者剛德既長柔邪必消剛道既成利有所往也象曰澤上于天夬者澤性流動雖蹔上天必決而下故取夬象君子以施禄及下居德則忌者夫行決斷之道必威恩並行若威而不恩即過在苛暴若恩而不威即失于制斷君子行決之時必須恩禄及于下人又須居德于身人則禀其威禁也忌是禁也初九壯于前趾往不勝為咎趾足也處體最下初九處決之首欲行決斷之事必須審其事宜量其可否然後始行其令今為剛健之初所壯在于趾足剛壯未全往必不勝先有咎生故曰往不勝為咎也九二惕號莫夜有戎勿恤者惕懼號呼也九二以剛處中剛則正直中又不偏而有此德能行決斷雖有人懼呼來報云至莫必有戎寇侵害緣九二自恃中直不枉刑斷雖聞此言心无疑憂而惑故曰勿恤也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎者頄面顴也謂上六也上六居衆陽之上居而不安若顴之處面以九三剛陽而應上六即是君子以助小人頄之處面誰人不見故曰壯于頄有凶也剥卦以隂應陽為善為隂柔須有所附今九三以陽應隂衆欲決去獨往應之為凶若達理君子知小人不可與親而能舎其本應決之不疑故曰君子夬夬也若獨行殊志應于小人即有罪罰如遇雨霑濡徒懷忿恨能无怨于人即須有愠无咎也九四臀无膚其行次且牽羊悔亡聞言不信者次且行不前之貎也羊壯也九四據下三陽前進必見侵傷猶如臀无膚則居不得安居不得安行亦難進然五陽當位體又剛壮四若牽繫于五身有所託即不剛不敢侵傷故曰牽羊悔亡也然四亦是剛陽雖五有剛壯未肯信服事五故曰聞言不信也九五莧陸夬夬中行无咎者莧陸草之柔脆謂上六也以九五之剛決上六之柔决之至易如決柔脆之物故曰莧陸夬夬以居尊位而親決上六即是以至尊而敵至卑雖其克勝不足為貴但處位中行纔得免咎而已故曰中行无咎也上六无號終有凶者以柔乘剛而居衆陽之上其猶小人乘陵君子凶危必至故戒之曰不用號咷終致凶也巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉象曰天下有風姤后以施命誥四方初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也九二包有魚无咎不利賔象曰包有魚義不及賔也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也九四包无魚起凶象曰无魚之凶逺民也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舎命也上九姤其角吝无咎象曰姤其角上窮吝也姤女壯勿用取女者姤者遇也初六一柔而遇五剛譬之人事即是一女而遇五男夫女之為道固合婉娩貞順處于幽室待禮乃行今遇五男淫壯若斯故不可取故曰女壯勿用取女也象曰天下有風姤者風行天下无物不遇故是姤象也后以施命誥四方者后君也誥誡也風譬王者風教也故風行草偃所以人君象此以施命誥戒于四方也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅者金者堅剛之物柅者制動之主謂九四也初六應在九四若繫于正應制動由四即合理之宜正之吉矣故曰繫于金柅貞吉也然初六處遇之初性又躁動即是不牽繫于四而有所往斯乃凶危立見故曰有攸往見凶然淫躁若斯又如羸弱之豕蹢躅而進故曰羸豕乎蹢躅也羸豕牝豕為淫醜也蹢躅行不正貎九二包有魚无咎不利賔者初六隂柔處下位故稱魚也初六與二相近不能逆于所近樂充九二之包厨故曰包有魚也初自願來非已侵奪故无咎也擅人之物以為已恵故不利賔也九三臀无膚其行次且厲无大咎者九三居下卦之上是一卦之主今初六與二相得而九三失其所據居即不安行亦不進故曰臀无膚其行次且然九三履得其位非為妄處直以不遇其時故致危厲灾非已招故無大咎故厲无咎也九四包无魚起凶初六與二相近樂充九二之包厨四失本應故曰包无魚九四既失其應即是下无民人若无人而動失應而作有所興為即致凶灾故曰起凶也九五以杞包瓜含章有隕自天者杞枸杞也瓜瓠瓜也杞生于肥地瓠瓜為物繫而不食也五居尊位下无其應猶如杞包瓜繫而不食其猶人君雖居貴位下既无人何以施其教命故曰以杞包瓜也下无應援教命不可行雖有章美之德而但包含之故曰含章也然以剛居尊懷剛中之德雖即教命不行无人敢有傾隕矣所有隕絶惟天而已故曰有隕自天也上九姤其角吝无咎者處遇之極无所復遇其猶一體之中遇角而已故曰姤其角也角既處上即非所安與不遇无異故生悔吝然下既无應不與物競故无凶災故曰吝无咎也坤下兑上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣象曰澤上于地萃君子以除戎器戒不虞初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也六二引吉无咎孚乃利用禴象曰引吉无咎中未變也六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也九四大吉无咎象曰大吉无咎位不當也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也上六齎咨涕洟无咎象曰齎咨涕洟未安上也萃亨者萃聚也其猶王者有德懷來萬邦人皆歸之故曰萃也人既歸已即無所不通故曰萃亨也王假有廟者假至也天下離散雖則有廟與無廟同縱使享祭神明不降今王既有德人神大同孝德乃洽王至此時始可假有宗廟故周𢎞正云鬼神享德不在食也利見大人亨利貞者當聚之時必須德大之人而為其主故書云惟天生民有欲無主乃亂故曰利見大人也大德之人能𢎞正道即使下民亨通而利以為正故曰亨利貞也用大牲吉利有攸往者大牲犠牛也大德之人而為其主聚道既全即宜用大牲吉利用攸往也象曰澤上于地萃者澤處地上水潦聚物是萃聚象也君子以除戎器戒不虞者除治也當大聚之時慮恐人心有異故曰君子亦修戎器戒慎防備不虞文聚武備是也初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎者初六應于九四見六三與九四相近心生嫌疑始以誠信相就忽然生疑未進故曰有孚不終也當萃之時貴于合會奔馳而往進不以禮故曰乃亂乃萃夫謙恭之道百行之本若以謙而行即無不合今初六若執此謙遜自比身云一握之小又為柔懦卑劣之容即六三邪偶安能固守于四即初六往必相得不用憂慮所以无咎故曰勿恤往无咎也一握者卑小之質喻已身如一握之微小也為笑者懦劣之容不敢作强剛之貎也六二引吉无咎孚乃利用禴者禴殷春祭名四時最薄也處聚之時貴相聚集方始合宜今六二體柔居坤守中不變意欲靜退不肯相從以為聚會斯乃違衆時即凶危必至必須牽引然後始行遂得吉而免咎故曰引吉无咎以六二體中懷信不求苟進既有斯徳即可以往至薄之物薦于鬼神鬼神降福故曰孚乃利用禴也六三萃如嗟如无攸利往无咎小吝者六三與九四不正不正相聚隂邪之應患必生焉故乃憂嗟而无所利故曰萃如无攸利然上六與三本是正應上六懷巽之道以求朋友故六三可以往而无咎與上合志而无所咎故往无咎然上六與三俱是隂柔雖是相應俱失其匹配之義故有小吝也九四大吉无咎居位不正又下據三隂即擅君之權禍咎將至必須立大功以補其過可以免咎故曰大吉无咎九五萃有位无咎匪孚元永貞悔亡者處聚之時最得盛位故曰萃有位也九四下據三隂専制已權已所宣命人不信服但自守而已故曰无咎匪孚也若能不與物競但自克修仁德久而獲福即憂悔可銷故曰元永貞悔亡上六齎咨涕洟无咎者齎咨嗟歎辭也居萃之極乘剛居上内无應援則憂患生焉故齎咨涕泣不安如此憂懼即衆所不害遂將免咎故曰无咎先儒云自目曰涕自鼻曰洟巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也象曰地中生木升君子以順德積小以成高大初六允升大吉象曰允升大吉上合志也九二孚乃利用禴无咎象曰九二之孚有喜也九三升虛邑象曰升虛邑无所疑也六四王用亨于岐山吉无咎象曰王用亨于岐山順事也六五貞吉升階象曰貞吉升階大得志也上六㝠升利于不息之貞象曰㝠升在上消不富也升元亨者升者漸進之名登升之義計必大通故曰元亨褚氏云猶人日思善道進而不已其德日新故能亨也用見大人勿恤者剛不居中无以統御于下故須用見徳大之人然後无復憂恤也南征吉者南是陽明之方當升之時若往隂方即彌加暗昧既見德大之人復宜適陽明之方即升進之道通矣二方以喻人之明昧也象曰地中生木升者升是漸漸登升道長之義亦猶地中生木從下升高自微至著也君子以順德積小以成高大者孔義云君子象之所以順行其德積其小善以成高大又何妥云君子謹習為先修習道德積其微小以至高大案此之義順字恐當為慎也初六允升大吉者允當也二三皆有應于上故升之不疑唯初六上无其應體又柔劣不能自進當九二九三升進之時與之俱行上合志必大得矣故曰允升大吉亦猶九二九三許允即獲吉也九二孚乃利用禴无咎者九二與五為應九二前進五必信任故曰有孚也二體剛中誠乎信實進不求寵志𢎞大業直是享薦神明但可儉約薄省而已亦得喜慶臻至更有何咎故利用禴无咎盖為上應于君矣九三升虛邑者以剛得位已以進前上體應柔不拒于已若升其虛邑无所疑滯故小象云无所疑也六四王用亨于岐山吉无咎者體柔居四下體三爻皆悉上升處升之際可納而不可拒其猶太王避狄之難居岐山之會故曰王用亨于岐山也若能因物而成順事之情納而不拒所以得吉而无咎故曰吉无咎也六五貞吉升階者以柔居尊不自専制委任九二任用得人故得保其升階而踐貴位也上六㝠升利于不息之貞者㝠猶瞑也既處升極而更升進即是瞑暗不得明了而猶求升故曰㝠升若㝠然求升欲為物之主者即喪亡交至如克己修身而不暫息施于正即利莫大焉故曰利于不息之貞也坎下兑上困亨貞大人吉无咎有言不信彖曰困剛揜也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也象曰澤无水困君子以致命遂志初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也困亨者困者窮阨委頓之名道乖力疲之義小人遭困則窮斯濫矣君子處之貞節不改而不失其通之道困而獲濟故曰困亨困而不能得通小人也貞大人吉无咎者處困不濫而能自通此唯體正修德之人處困而能保之然後吉无咎也有言不信者當困之時欲希濟困必須修身慎行立德立誠而乃巧辭飾言以求其濟人何以信轉益困窮也象曰澤无水困者水在澤下澤中萬物枯稿困之象也君子以致命遂志者君子守道而處雖遭困厄之世而不渝濫以謟世俗假使致命喪身固當守節不移以遂高尚之志故素書云如其不遇沒身而已是也初六臀困于株木入于幽谷三嵗不覿者以隂爻最居窮下即是沉滯窮困居不得安若處于株木之上故曰臀困于株木也處困之時欲進即二隔其路欲且處又居之不安懼于困危遂乃逃竄故曰入于幽谷也困極即通事之常理不過數年困危必釋可以出矣故曰三嵗不覿也九二困于酒食朱紱方來利用亨祀征凶无咎者以剛處中以陽居正又无偏應體剛即能濟困居隂即以謙待物物之所歸也處中即德行不邪无應即心无私黨有此衆美即物皆歸已不勝飽飫故曰困于酒食也朱紱南方祭服也九二體屬坎卦坎為北方言九二有此美徳陽明方物而來即東西二方必至故曰朱紱方來四方歸向庶物豐盈可以亨薦神明克降其福故曰利用亨祀也盈而又進傾敗道也以此征行凶危交至故征凶凶禍自已所招豈合咎怨他人即得无咎也六三困于石據于蒺藜入于其宫不見其妻凶者石者為物堅剛而不可入謂九四也蒺藜之草有刺而不可踐謂九二也六三以隂居陽不正而處上无應援无所之適志懷剛武欲親于四四又不受如石之堅欲附九二二又不許猶如蒺藜刺而難踐故曰困于石據于蒺藜也无應而行失其配偶譬之入于宫中而不見其妻處困如斯固其凶矣九四來徐徐困于金車吝有終者徐徐是疑懼不速之貎也金車謂九二以剛處中如車材强壯也四欲就初六懼九二為難心懷疑懼不敢速進是困于九二之金車故曰來徐徐困于金車也有應在初而未相遇是以有吝以謙得物故乃有終也九五劓刖困于赤紱乃徐有説利用祭祀者以陽居陽而无謙遜物則不附怒其不來附已乃行劓刖之刑故異方之人轉更離叛故曰困于赤紱矣以剛居中不昧所見改修其道以謙得衆故用寛徐人悉歸已乃有喜恱故曰乃徐有説剛而處尊而用中直即可亨祭而獲福慶故曰利用祭祀也上六困于葛藟于臲卼曰動悔有悔征吉者葛蔓也藟纒繞貎臲卼摇動不安貎上六處困之極即是困極也无應乘剛行即被物纒繞居則臲卼不安故曰困于葛藟于臲卼也曰思謀之辭也凡物窮思變極即謀通處至困之地何有通路故須思謀曰我若守此必見不濟謀逃逸可以免之發意逃時其悔乃生故繫辭云吉凶悔吝生乎動是初動而有憂悔當奔逸冒險之時又生憂悔既出險外即不慮危困所以征行而獲吉故曰動悔有悔征吉也巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也象曰木上有水井君子以勞民勸相初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也九二井谷射鮒甕敝漏象曰井谷射鮒无與也九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也六四井甃无咎象曰井甃无咎脩井也九五井洌寒泉食象曰寒泉之食中正也上六井收勿幕有孚元吉象曰元吉在上大成也井改邑不改井者古人穿地汲水以供人用故謂之井井以潔淨為義也邑民産也其屋遷移井體不改亦猶人之常德改過不吝德行有恒故曰改邑不改井也往來井井者往者來者皆汲引之而不以貴賤汲引改其清潔之性也无䘮无得者此舉井體有恒不隨物之遷變故終日泉注未嘗言溢終日汲引未嘗言竭也汔至亦未繘井羸其瓶凶者繘綆䋲也汔將至之義羸舒展也言汲水將至井口其綆猶未盡出而鈎舒繩斷傾覆其瓶即是勞而无功喻人行其恩德須善始令終若有始无終不能永保其故就人事言凶也書云為山九仞功虧一簣是也象曰木上有水即是汲水而上井之象也君子以勞民勸相者勞賚相助也井之為義養而不窮以勞賚之恩勸恤勤恵令助百姓使有成功故周𢎞正云勸助民人使功日濟是也初六井泥不食舊井无禽者初六最處井底即是井下淤泥沉滓而不可食井既舊穢不曾淘渫即禽鳥賤類而尚不向即人與禽俱在棄捨故曰舊井无禽喻人不潔已修行為人所棄是也九二井谷射鮒甕敝漏者鮒井底小魚也夫井之為道以下給上為義今九二與初六相近而附于初即是附給下之義如以溪谷之水從上注下射轍鮒魚故曰井谷射鮒也井不上汲反以下注失井之道又似甕之破漏出水而注下故曰甕敝漏也子夏傳曰鮒是蝦蟇也九三井渫不食為我心惻可用汲王明並受其福者為猶使也渫治也言井既淘渫修治其水清潔可以食之猶人德行已成可以任用今既不食即使我中心惻愴故曰井渫不食為我心惻若王者明鑒用我以為輔弼既喜其行又欽其用故曰王明並受其福也得人助己而化洽民之有幸故獲其福矣六四井甃无咎者甃猶修治也壞處以磚甃壘也六四得位无應得位即可以自處无應即不可以行其猶人之為道无施行之功即可以修德自處故无咎也九五井洌寒泉食者洌清潔也寒者表清潔之義也餘爻不當貴位皆修德待用九五既居尊位能擇人而用之以剛居中下无私應剛中即能斷制非妄下无私應即无偏曲之心猶剛正之主不任貪濁之臣必須行潔賢明而後始用故曰寒泉食也上六井收勿幕有孚无吉者凡五榖收成倍于常年者曰收也上六處井之極井道大成如五榖之有收成故曰井收也幕是覆盖也井既大成不須覆盖而不私其利使天下悉皆汲引即是信被天下而致大成故獲大吉故曰勿幕有孚元吉也離下兊上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉象曰澤中有火革君子以治厯明時初九鞏用黃牛之革象曰鞏用黄牛不可以有為也六二已日乃革之征吉无咎象曰已日革之行有嘉也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九四悔亡有孚改命吉象曰改命之吉信志也九五大人虎變未占有孚象曰大人虎變其文炳也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也革已日乃孚者革改變之名易舊之義故名革也革既改舊易新即是王者創制命令改前王之法度以其初施法令民有所感未便從伏必須已竟今日明日方始從令故宋􅇆云人性習常不説改易及變之後樂其所成故即日不孚已日乃孚矣故曰已日乃孚也已竟也元亨利貞悔亡者悔之所生生乎變動也今革既變故人心不安必有憂悔今革道既當即得大通利正而憂悔乃亡故須備此四德矣象曰澤中有火革者火居澤下火炎上澤潤下二性交故能變革也君子以治厯明時者寒暑迭終日月更運天時人事各以時遷故君子觀茲革象修治厯數以明天時也初九鞏用黃牛之革者鞏固也黃中也革是牛皮生曰革熟曰韋今初九處革之初未肯從變言其執志堅固守中和之道不肯造次從變如似牛皮堅韌不從改變之命也六二已日乃革之征吉无咎者隂柔之體不敢為先故革命已行竟日之後乃始從之故曰已日乃革之既從革命無復疑阻往就於五不被疑難故可以征進而獲无咎也九三征凶貞厲革言三就有孚者三處炎極火性上炎上體是水水性柔順九三以剛居火極火性剛猛故有革命之言而上體三爻以受命令不敢有違其言不虚故曰革言三就有孚也人既從命更興征伐即是非理興師所以致凶夫興師動衆是正道之危故曰征凶貞厲也九四悔亡有孚改命吉者无應故有憂悔能從革命故曰悔亡也居水火之際不為固吝信彼改命之制合時之願所以獲吉故曰有孚改命吉也九五大人虎變未占有孚者居得尊位以大人之德為革之主即是革去前王之命為新創之君信德自著合人之心不勞占決斯湯武之君是也虎變者謂改正朔易服色取其文章炳煥又取虎之威猛可畏之義也上六君子豹變小人革面征凶居貞吉者處革之極變道已成君子居之雖不如大人之變如虎之文然亦可順時而行如豹文之暎蔚故曰君子豹變也若小人處之但能變其顔面順上而已故曰小人革面也革變已極人皆從命固宜靜處而更以征伐為求即是躁擾於人所以致凶如靜而居之皆獲吉故曰征凶居貞吉也巽下離上鼎元吉亨彖曰鼎象也以木巽火亨餁也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨象曰木上有火鼎君子以正位凝命初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以從貴也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也鼎元吉亨者鼎者器象之名故何妥云古者鑄金為此器能調五味變故取新以成烹飪之用以供宗廟次養聖賢天子以天下為鼎諸侯以國為鼎變故成新尤須當理故先元吉後乃亨通故曰元吉亨也象曰木上有火鼎者巽木也又為入離火也木入火中是烹飪鼎之象也君子以正位凝命者凝嚴整也鼎既變故成新所以君子象之正定尊卑之位使其有别布示嚴凝之命使其不妄輕犯也初六鼎顛趾利出否得妾以其子无咎者趾足也顛倒也鼎之為義下實上虚虚以納物實以受物也今初六以隂處下即是鼎口向下鼎足倒上即是鼎傾覆足倒在上故曰鼎顛趾也鼎既顛趾其所利者利在傾棄鄙穢之物故曰利出否也以事明之亦猶正室雖亡媵妾不可為室主若以妾為室主亦猶鼎之顛趾咎莫大焉妾若有子即母以子貴以此繼室猶可免咎故曰得妾以其子无咎也九二鼎有實我仇有疾不我能即吉者實為陽也即就也鼎之為義虚中待物乃是其常今九二以陽居中失虚中之義施之人事即是志意盈滿不受規誨故曰鼎有實也我仇謂五也仇匹也然六五是我之仇匹有乘剛之疾不得來就于我為六五下有二剛爻為疾也我得全其志不為驕盈即獲吉也故曰我仇有疾不我能即吉也九三鼎耳革其行塞雉膏不食方雨虧悔終吉者鼎之為義下實上虚九三既處下卦之上即是鼎耳鼎耳之用唯在虚空以待鉉而舉之今九三以陽處之而自實塞即是變革鼎耳之常道也故曰鼎耳革以人事明之是懷小人之行而自實塞不納賢良故曰其行塞也既无虚中待物之心物亦不來歸已猶之雉膏美物而終不得食故曰雉膏不食也方雨虧悔終吉者此戒其勿行剛處亢以柔和為用若不全任剛亢務在和通方欲為此和通即虧減其悔終獲吉矣雨喻隂陽和順也九四鼎折足覆公餗其形渥凶者餗是八珍糝鼎之實也渥霑濡之貌九四應在初初已傾棄穢物即九四有以受其珍美之物也九四上近于五即有承五之心下又應初又有施下之義既承且施力所不任即致折足而傾棄其餗故曰鼎折足覆公餗鼎足既折覆于地即被沙鹵霑濡喻之于人智小謀大力小任重受其至辱災及其身故曰其形渥凶六五鼎黄耳金鉉利貞者黄中謂五也金剛謂二也鉉者扛鼎之物也六五以柔居中故曰黃耳應在九二以柔納剛納金鉉而以舉之故曰金鉉也所納剛正不為虚妄故曰利貞上九鼎玉鉉大吉无不利者堅剛之物而懷潤澤之性喻道大成而有斯美體剛履柔是用玉鉉而以自舉故曰鼎玉鉉也應不在下不私其用故獲大吉而无不利故曰大吉无不利也震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也象曰洊雷震君子以恐懼脩省初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也六三震蘇蘇震行无眚象曰震蘇蘇位不當也九四震遂泥象曰震遂泥未光也六五震往來厲億无喪有事象曰震往來厲危行也其事在中大无喪也上六震索索視矍矍征凶震不于其躬于其隣无咎婚媾有言象曰震索索中未得也雖凶无咎畏隣戒也震亨者震動也此象雷之卦雷是天之威動也雷之威震人皆驚懼因此恐懼而乃脩德恭儉整肅所以獲通故曰震亨也震來虩虩笑言啞啞者虩虩恐懼之貎啞啞語笑之聲故迅雷風烈君子為之變容天既威震人皆恐懼不敢怠慢遂乃脩德道成德立福慶亦至福至之後方敢喜樂故曰笑言啞啞也震驚百里不喪匕鬯者匕者其形如箄可以舉鼎中之物也鬯是香草取之釀酒祭廟之用也震卦體屬長子若君出于外或為巡狩等事即長子監臨於國威震肅齊廣及百里百里者取雷震百里之義承主祭祀粢盛之器守而不失故曰不喪匕鬯也象曰洊雷震者洊者因仍之義雷聲連續威震相仍雷電赫赫故曰洊雷震也君子以恐懼修省者恐怖也懼驚駭也君子立身恒懷驚肅若臨泉谷如履薄氷况遇天之威怒彌益修身省察已過也初六震來虩虩後笑言啞啞吉者以剛處卦之先剛則不暗於幾先則能有前識當威振之時天威大行而能懼以修德遂至笑語之盛吉福臻焉六二震來厲億䘮貝躋于九陵勿逐七日得者初九以剛居下因懼修徳即是有德之人今六二不能敬剛陽尊有德而反乗之即為天之所誅罰故威震若來即致危厲哀嗟傷嗟亡其資貨糧用之屬也故曰震來厲億䘮貝也億傷嘆之辭也貝者資貨糧用之屬也違天不敬遂被天誅懼天之威而乃迯竄威嚴大行人不容舍无糧而走必將困危雖超九陵不過七日為有司所獲故曰躋于九陵勿逐七日得也六三震蘇蘇震行无眚者蘇蘇是心懐憂慮不安之貌六三履位不正心恒憂慮不獲安寧故曰震蘇蘇也雖心不安而不乗剛不為乖逆故可以懼行而无災眚故曰震行无眚也九四震遂泥者泥沉溺也九四以剛陽之質在四隂之中為四隂之主固宜挺身獨立以安於衆若以自懷恐懼不能挺㧞即致泥溺沉困於難故鄭衆云身既不安豈能安衆是也六五震往來厲億无䘮有事者往即无應來又乘剛往之與來不免危厲也夫處威厲之時而居尊位即是天助君命威令大行斯乃有事之機矣故戒之曰但保其位守中自安能髙大其行无所䘮失即懷大事故曰億无䘮有事也上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言者索索不安不専之貎矍矍視不正不審諦之容也上六處震之極是懼之極矣既居極懼之地而欲求安亦不能得故心懷不安乃索索然而所瞻視又不専審乃矍矍矣憂懼若此更有征即將有凶危至故曰征凶也若所懼之事非是已作若因鄰家有事懼相連及預先防戒即得免咎故曰震不于其躬于其鄰无咎處極懼之時雖復姻親亦不无相疑之言故曰婚媾有言也艮下艮上艮其背不獲其身行其庭不見其人无咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也象曰兼山艮君子以思不出其位初六艮其趾无咎利永貞象曰艮其趾未失正也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也九三艮其限列其夤厲薰心象曰艮其限危薰心也六四艮其身无咎象曰艮其身止諸躬也六五艮其輔言有序悔亡象曰艮其輔以中正也上九敦艮吉象曰敦艮之吉以厚終也艮其背艮者靜止之義此卦象山之為體安然靜止不動不移故以為名也以人事喻之貪欲之情傷性壞義防其動欲制其未成故老子云不見可欲使心不亂是也背者无見之物今既止在其背目之不見即動欲之情不生故曰艮其背也不獲其身行其庭不見其人无咎者夫對面而止即情有所動抑傷其情而强使止患必生焉今止在其背故不獲其身雖行于庭不見其人即无咎矣象曰兼山艮者孔氏云兩山兼重謂之兼山也直置一山已能鎮止兩山重疊止義彌大故曰兼山艮也君子以思不出其位者艮之為義各止其所故君子象之思慮不出已位不妄動求不相侵也初六艮其趾无咎利永貞者趾足也又處卦之下即是趾在于足既止于是不為躁動而得无咎故曰艮其趾无咎靜止之初心无動欲其利在于永長貞正故曰利永貞也六二艮其腓不拯其隨其心不快者腓腨腸也拯舉也隨謂足也六二止于腓腓體動躁屈伸摇動皆隨其足今止在腓腸足既不舉腓无由動故艮其腓不拯其隨也腓性動躁而强止之則傷其本性情與體乖故其心不能快樂矣故曰其心不快也九三艮其限裂其夤厲薰心者限是身之中人繫帶之處三居兩卦之際即時止在其限故曰艮其限也夤當脊中之肉也薰燒灼也三既處二卦之際即上下不通是分裂其夤身將䘮矣乃憂危之切故薰灼其心故曰厲薰心也然君子治國若治于身上下不通君臣不接故裂夤即身亡不接則國䘮故王𫝊云體分兩主大器䘮矣大器謂國之與身也六四艮其身无咎者已入上體與九三相得兩體不分全乃謂之身履得其位而全其身不陷非妄所以无咎也六五艮其輔言有序悔亡者輔夾車也六五艮于輔頰之間即是慎止言語密于樞機故曰口無擇言言有倫序所以悔亡故曰言有序悔亡也上九敦艮吉者敦厚也居止之極敦厚在上不為妄累所牽故獲吉也
