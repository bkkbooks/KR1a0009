body:
  text: 周易口訣義卷四唐史徴撰下經一咸至益艮下兌上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣象曰山上有澤咸君子以虚受人初六咸其拇象曰咸其拇志在外也六二咸其腓凶居吉象曰雖凶居吉順不害也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九五咸其脢无悔象曰咸其脢志末也上六咸其輔頰舌象曰咸其輔頰舌滕口說也咸亨利貞者咸感也感應也以二氣交感所以亨通感應之道必須以正故曰利貞也取女吉者以艮兌俱是少相配交感感而又正備禮乃行即是婚取之善也象曰山上有澤咸者山體空虚艮陽澤性潤下兌隂山受澤潤萬物以生是相感之象也君子以虚受人者夫欲感人之心懷來萬邦者必須空虚其心受納諸物无所棄遺何妥云虚心受人不閒不拒即物來歸已君子之志也初六咸其拇者拇是足大指初六處感之始而應于四喻體之中在于足指相感微淺故无吉凶悔吝也六二咸其腓凶居吉者腓􅈩腸也腓體動躁或屈或伸不能安靜若以躁感物必致凶災若靜而相感即懷吉慶故曰咸其腓凶居吉九三咸其股執其隨徃吝者股腿䏶也隨謂足九三漸進于腿䏶之間股之為體動靜不能自處常執隨其足股非動躁之物而彊抑其情譬之于人自无特操卓然獨處而乃隨從于人是所執卑劣以斯而行必招恨辱故曰往吝也九四貞吉悔亡憧憧往來朋從爾思者以陽居隂邪僻相感患必生焉故須貞正獲吉憂悔乃亡故云貞吉悔亡也憧憧往來之貌夫相感之道固當修徳安處其位使物自來即朋黨從爾所思斯未為光大故小象云未光大也九五咸其脢无悔者脢背脊也夫感應之道貴乎心實今九五所感在于脢明其非在衷心薄于交義故但无悔而已脢亦心之上口之下也上六咸其輔頰舌輔頰是言語之具上六咸道之末所感在于口舌頰頷之間不能以心相感但滕達口舌傳說而已故小象云滕口說也巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久于其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恒而天地萬物之情可見矣象曰雷風恒君子以立不易方初六浚恒貞凶无攸利象曰浚恒之凶始求深也九二悔亡象曰九二悔亡能久中也九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也九四田无禽象曰久非其位安得禽也六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恒凶象曰振恒在上大无功也恒亨者恒久也恒久之道所貴變通不能變通无由長久故繫辭云易窮則變變則通通則久是也无咎利貞利有攸往者恒而亨以濟三事也謂旣變通即无咎過故利以修正正道既行即何往不利也象曰雷風恒先儒皆云雷資風而益逺風假雷以增威故君子以立不易方者方道也言君子立身修行舉事合宜不移其道宜于世俗也初六浚恒貞凶无攸利者浚深也初六處恒之始即合漸漸以求于恒而乃浚然使深深為恒是凶正害徳无施而利故貞凶无攸利也九二悔亡以陽居隂位旣不正所以有悔守其謙道所以悔亡也九三不恒其徳或承之羞貞吝者居下卦之上即是進慕高位處上卦之下又欲靜退自守故不恒守其一徳是執心不定徳行无恒即有恥辱至焉以此為正亦可賤矣故貞吝也九四田无禽者畋獵也禽喻有功也處恒之時位既不正即是田獵无所獲喻有事而无功也六五恒其徳貞婦人吉夫子凶處恒之時而得尊位當須普親天下而乃專志在二即是執守一徳故曰恒其徳貞也既不能廣親賢徳守一而已斯乃婦人之道若譬之丈夫即致凶災故夫子凶也上六振恒凶者振躁動也處夫動極即合安靜无為无事而已反以躁動求為即有凶危及也艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉象曰天下有山遯君子以逺小人不惡而嚴初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也六二執之用黄牛之革莫之勝說象曰執用黄牛固志也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也九四好遯君子吉小人否象曰君子好遯小人否也九五嘉遯貞吉象曰嘉遯貞吉以正志也上九肥遯无不利象曰肥遯无不利无所疑也遯亨者遯是逃隠退避之名諭小人道長君子當退避而後可亨也小利貞者雖居小人道長之時正道亦未全滅亦可小利為正也象曰天下有山遯者積陽為天積隂為地山者隂長之象山勢漸長以逼于天天性高逺逼而不至如天漸高避於山君子之逺小人不惡而嚴者處小人道長之世近之必致危害故須逺避不可與之為惡又須莊敬嚴恭自保其身也初六遯尾厲勿用有攸往者尾之為物最在體後處遯之時衆皆逃遯唯初六最在于後即必被執獲故致危厲若能知尾為危不如不往即无災害故曰勿用有攸往也六二執之用黄牛之革莫之勝說者黄中色也以譬中和也牛革即是牛皮喻其厚順也處逃遯之時衆皆逃遯唯六二得位守中不肯逃遯意欲率衆以安其處何以勸勉之必須用中和之道厚順之徳有此之善人莫勝已可脫免逃遯而去也九三係遯有疾厲畜臣妾吉者夫親昵小人即為小人侵傷故有疾憊危厲也然親洽于二雖得如似畜養臣妾不可興建大事故小象云不可大事也九四好遯君子吉小人否者有應在内即情有所戀身處于外即志欲逺遯若知幾君子思慮危害而能超然不顧所應而好遯避即獲吉矣故曰好遯君子吉小人處此情有所戀不肯遯故曰小人否否是否臧之否也九五嘉遯貞吉者嘉美也五居尊位為遯之主率正小人之志以安于俗不令遯散故獲美善之吉也上九肥遯无不利者肥者優饒之名上九處遯之時最居于外内又无應即无顧戀超然高舉不為小人所累是逃遯之時而得優饒者也既有如斯之徳即无不利矣乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣象曰雷在天上大壯君子以非禮弗履初九壯于趾征凶有孚象曰壯于趾其孚窮也九二貞吉象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九四貞吉悔亡藩決不羸壯于大與之輹象曰藩決不羸尚往也六五喪羊于易无悔象曰喪羊于易位不當也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也象曰明出地上晉君子以自昭明徳初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也六三衆允悔亡象曰衆允之志上行也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之象曰明入地中明夷君子以莅衆用晦而明初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也六五箕子之明夷利貞象曰箕子之貞明不可息也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也明夷利艱貞者夷傷也離為日喻日入地中傷明之象故曰明夷以人事明之亦猶君在上臣不敢顯其明徳必須艱固為貞又不可隨世傾邪故曰利艱貞也象曰明入地中明夷者夫日之為道即合升髙照耀今在地中傷其光耀之象君子以莅衆用晦而明者莅臨也晦暗也故君子當是時以臨于衆内懷明徳外彰晦暗无為无事清淨不欺閉智塞耀故老子云我无為而人自化是也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言者上六以隂居上是暗君之象初九旣居无位之地未食暗君之禄可以逃避危難不由軌路如鳥之飛故曰于飛懷懼而行以求隠翳故曰垂其翼雖處危懼志存道義故曰于行切于逃難饑不暇食故曰三日不食處危懼之時與衆乖異故主人有相疑之言故曰有攸往主人有言也六二明夷夷于左股用拯馬壯吉者左者明所傷小也左股被傷猶得順而處位六二以柔居中不為剛猛之事即不為暗主所疑猶處其位然後時進退乃得隨時用拯馬而避之得吉也九三明夷于南狩得其大首不可疾貞者南是陽明之方也狩者征伐之義九三以離明之極而以征伐至暗之主乃獲暗君之頭首故曰南狩得其大首也既誅暗主將正其民民迷日久即可化之以漸不可速使從正故曰不可疾貞也六四入子左腹獲明夷之心于出門庭者左者取其順也腹者獲其心既知君意雖近不危縱使逃難不逺適止于門庭而已也六五箕子之明夷利貞者最近暗君猶箕子之近殷紂執正不回而不能滅利以正貞故小象云明不可息也息滅也上六不明晦初登于天後入于地者處明夷之極是暗晦之主殷紂當之也初登于位本謂光徳顯于四方及其无道果致被伐至于䘮滅故曰後入于地也離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人君子以言有物而行有恒初九閑有家悔亡象曰閑有家志未變也六二无攸遂在中饋貞吉象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也六四富家大吉象曰富家大吉順在位也九五王假有家勿恤吉象曰王假有家交相愛也上九有孚威如終吉象曰威如之吉反身之謂也家人利女貞者家人謂室家之人故孔氏云明家内之道正一家之人是也治家之道非丈夫獨正内在女子故曰利女貞也象曰風自火出家人者離火巽風夫火之為體因風而生火既炎盛還復生風風火相成似夫婦成家之義也君子以言有物而行有恒者物事也君子所言皆須有事論語典實事不虚妄矣所行徳行不虧于常故曰行有恒也初九閑有家悔亡者閑防也夫治家之道必須先以防慮不令凟亂若候凟亂之後方始治之即憂悔生矣今治家之初便能防閑悔必亡矣六二无攸遂在中饋貞吉者以柔處中以隂應陽正夫婦之義也婦人職務但事供給饋食祭祀而已全非遂志之人故曰无攸遂在中饋貞吉也九三家人嗃嗃悔厲吉婦子嘻嘻終吝者嗃嗃嚴整之貌嘻嘻喜笑之聲悔過也九三處一卦之上為一家之長理家之道必須嚴整直是過于猛難雖似危酷後乃獲吉故曰家人嗃嗃悔厲吉若從婦人笑語不制不節終致悔吝故曰嘻嘻終吝也六四富家大吉者富謂禄位昌盛之名也六四柔巽之質上奉于君而得其位即是禄位昌盛而富其家長保安吉之大也九五王假有家勿恤吉者假至也體剛居巽而得尊位能以巽順接待于下至于天下盡有其家莫不歸王之化故不假憂恤自然獲吉先儒云猶如舜能治家處于媯汭即是歸讓至焉上九有孚威如終吉者處家人之極家道大成也刑于寡妻義彰于外信被天下故曰有孚威及遐邇故曰威如威信並至敬義交接終保其吉故曰終吉也兌下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象曰上火下澤睽君子以同而異初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以避咎也九二遇主于巷无咎象曰遇主于巷未失道也六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪宼婚媾往遇雨則吉象曰遇雨之吉羣疑亡也艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉象曰山上有水蹇君子以反身脩徳初六往蹇來譽象曰往蹇來譽宜待也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也九三往蹇來反象曰往蹇來反内喜之也六四往蹇來連象曰往蹇來連當位實也九五大蹇朋來象曰大蹇朋來以中節也上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉象曰雷雨作解君子以赦過宥罪初六无咎象曰剛柔之際義无咎也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也六三負且乘致宼至貞吝象曰負且乘亦可醜也自我致戎又誰咎也九四解而拇朋至斯孚象曰解而拇未當位也六五君子維有解吉有孚于小人象曰君子有解小人退也上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也解利西南者解緩也謂難道解釋物情舒緩故謂解也西南坤位坤訓衆也夫散難釋險利施于衆即所濟𢎞大故曰利西南也无所往其來復吉者若難道已散无難可救即宜反覆守其靜黙即合于常理也有攸往夙吉者夙早也速也若難道方殷慮其侵傷平人必須速往救濟以安險俗故曰夙吉象曰雷雨作解者雷既發動雨澤施降物情舒暢故是解緩之象也君子以赦過宥罪者赦放也宥寛也過謂誤犯罪謂故為過輕即放捨罪重即寛宥如似合死從流合流從徒皆是緩其罪刑也初六无咎者難道已散上有所應故无咎也九二田獲三狐得黄矢貞吉者隠伏之物喻犴猾之人九二以剛居其位為君委任能散險難能除奸暴之人如似田獵而獲三狐能持中直之道而令其正故曰得黄矢貞吉也六三負且乘致宼至貞吝者六三位既不正而以諂媚上附九四下乘于二如似擔負之人乘君子之乘即寇盜必見其侵傷故曰負且乘致寇至以不正之身雖幸而免是正人之所賤故曰貞吝也九四解而拇朋至斯孚者拇足指也而汝也九四位既不正三亦不正以相親比三附于四如指附足然九四本應在初若與三相附即失其本應若四能棄三之拇即初六之朋與已合信故曰朋至斯孚也六五君子維有解吉有孚于小人者以柔居尊不自專制而委九二任用得人是有君子之徳而能解釋險難故曰君子維有解吉也以君子之道而能散難即小人雖伏暗昧亦能信服君子不敢為非故曰有孚于小人也上六公用射隼于高墉之上獲之无不利者公者臣之極貴者也上六以陽居極故稱公也居動之上為解之極是能去貪暴除兇悖故以射隼論之隼者貪賤之鳥鷹鸇之屬為六三失位不正隼之為鳥宜居山林而止于人家墉墻之上即為人所憎射之克中故曰獲之无不利也兌下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行象曰山下有澤損君子以懲忿窒欲初九已事遄往无咎酌損之象曰已事遄往尚合志也九二利貞征凶弗損益之象曰九二利貞中以為志也六三三人行則損一人一人行則得其友象曰一人行三則疑也六四損其疾使遄有喜无咎象曰損其疾亦可喜也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也損有孚元吉无咎可貞利有攸往者損是減損之名喻人臣損下而益于上故名損也夫損之為道若不以誠信即咎莫大焉必須有信然後大吉故曰有孚元吉也既立誠信而獲大吉即无咎過而可止故曰无咎可貞以无咎可貞之徳故利有攸往也曷之用二簋可用享者曷何也當損之時物皆儉損何用豐厚但以簋薄之禮應時而行可以享獻神明也象曰山下有澤損者澤在山下澤卑山高以澤自損以崇于山亦猶下之自損奉益于上也君子以懲忿窒欲者懲止也窒塞也夫情欲所興隨境而動若任其情欲患必生焉故君子修徳益損其身當須懲止忿怒窒塞情欲即善莫大焉初九已事遄往无咎酌損之者已竟也遄速也損之為道損下益上猶如人臣損己而奉于君然初九猶有權務若廢職而往潛為求進即咎莫大焉若已事不往即為拒上敖貴故事竟速往乃得无咎故曰已事遄往无咎也夫剛往即柔危若全以剛往即四不相納故酌減損之與四合志故曰酌損之也九二利貞征凶弗損益之者當損之時雖以下奉上損剛益柔然損剛太極即剥道成焉故九二利居其位守正而處即可以貞若進于柔即凶故曰利貞征凶然知進必有凶故九二以中為志不求損已而務增益故曰弗損益之也六三三人行則損一人一人行則得其友者處損之時損之為義其道上行三人謂六三已上三隂也夫天地之道以淳一相感男女之道以正一相配今六三應于上九若往就上九即六四六五緣同類必隨之俱行此㧞茅義也若六三獨行即上九納之无疑而得配友故曰三人行即六三獨損六三自行即得匹配此是致一之道也六四損其疾使遄有喜无咎者疾謂相思之疾也久而不相見必有勤望之憂故積憂成疾六四以柔納剛同志斯來即无復勤思之疾故使遄速乃有喜有喜乃无咎矣故曰使遄有喜无咎也六五或益之十朋之龜弗克違元吉者處損之時以柔處尊是能益損于已而用柔和則天下莫不歸而益之故曰或益之朋黨也龜者決疑明鑒之物喻明智也克能也六五以柔居尊是損己奉人納賢自輔即賢智必歸各貢其能不違于五故曰不克違也羣才既至天與我民无不扶祐天人並助故獲大吉故曰元吉也先儒皆云十朋龜者一曰神二曰靈三曰攝四曰寳五曰文六曰筮七曰山八曰澤九曰水十曰火上九弗損益之无咎貞吉利有攸往得臣无家者損極反益象人能抑損其身而奉它人乃為物所益故曰弗損益之損極而反受益即剛徳遂長不憂于咎用正而吉故曰无咎貞吉也既備斯徳何往不利故曰利有攸往也居上乘柔損極反益體本剛徳為物所歸故曰得臣得臣者謂得臣子而輔君為政使天下通而為一故曰无家无家者光宅天下不為私已以天下為一家故曰无家也震下巽上益利有攸往利涉大川彖曰益損上益下民說无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行象曰風雷益君子以見善則遷有過則改初九利用為大作元吉无咎象曰元吉无咎下不厚事也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也六四中行告公從利用為依遷國象曰告公從以益志也九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也益利有攸往者益是増長之名饒裕為義也損卦損下益上益卦損上益下者亦猶人君能自損己而惠下人故宋衷云明君之徳必須損己而利人則下盡益矣君能以益物為意動而无有違者即斯而往何所不利故曰利有攸往也利渉大川者能益于物則理絶難險故利涉大川也象曰風雷益者雷以發生風能長育萬物皆益故益之為義在雷風也君子以見善則遷有過則改遷進移也改更懲也君子求益莫過遷進企慕道徳其有過惡改更懲戒不再為也初九利用為大作元吉无咎者處益之初應巽之始體剛幹事能堪建大事之端以成王事者也然雖有其才而得其時不居其位即時人不輔欲有興作即禍必生焉必須有大功以補其過即得无咎故曰元吉无咎元吉是有功之詞大作謂興作大事也六二或益之十朋之龜弗克違永貞吉王用享于帝吉者以柔居中又應于㢲處益而懷巽即物皆歸焉故曰或益之朋衆也龜靈鑒也六二既懷謙冲即物自外來朋靈獻䇿羣才響應故十朋之龜弗克違也然位不當尊故永貞吉也處益如斯上下歸徳故王用此時可以享獻天帝即朋靈降福故曰王用享于帝吉也六三益之用凶事无咎有孚中行告公用圭者以隂居陽以剛健而求于益故曰益之不能行謙而用剛壯求益即物所不與若以謙讓責之理合誅討若以意測原本情志在救難即物皆恃之是用凶事而得免咎故曰用凶事无咎也若乃求益不為私已志在救難用壯不至剛暴斯乃適合時宜是有信實而得中行此中行之道執圭以告于公救凶危之事故曰有孚中行告公用圭也六四中行告公從利用為依遷國者以柔處臣位居㢲之初在上應下位雖不中用中而行故曰中行與君相近即是藩屏之臣以此中行之道而告于公公必從之以此道依人而遷國人无不順明以中行之道而遷國人无不利矣故曰利用為依遷國也九五有孚惠心勿問元吉有孚惠我徳者得位處尊為益之主兼張徳義徳義之本莫盛乎信為益之大莫大于心因人所欲而已與人有信有惠盡物之心益之盛矣既有斯徳必獲大吉不假疑問徳必昭彰故曰有孚惠心勿問元吉我既以信惠被于物則天下皆以信惠歸我故有孚惠我徳也上九莫益之或擊之立心勿恒凶者處益之極益之甚也既已過盈即人之不與故曰莫益之也无厭之求怨怒非一故曰或擊之也勿无也益以過極而更有求是立心无恒凶禍必至故曰立心勿恒凶也周易口訣義卷四
