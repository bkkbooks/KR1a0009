body:
  text: 周易口訣義卷一唐史徵撰上經一乾至小畜周易傳為上經第一者先儒云易有三名夏曰連山殷曰歸藏周曰周易康成云連山者象山之出雲歸藏者莫不歸藏于其中周易者言易道周普無所不備竊謂易者是文王所演因代為名故稱周也易取變通為義上經者三十卦象陽取其三之竒數也經猶徑也謂聖人亦以易道教人可以踐履濟涉徑路無所不通也卦者挂也謂懸挂物象吉凶之理顯焉傳者傳也如孔氏傳之類也乾下乾上乾元亨利貞初九龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍無首吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧象曰天行健君子以自強不息潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也乾元亨利貞者乾天也天是體名乾是用名謂天體凝寂非人所法故聖人欲使人法天之用不法天之體故名之曰乾而不名之曰天也若元亨利貞此四者亦是天之四德也天以四時之氣春生秋殺冬寒夏暑有此四時之義故名為天也周氏云元始也於時配春言萬物始生得其元始之序發育長養亨通也於時配夏夏以通暢合其嘉美之道利者義也於時配秋秋以成實得其利物之宜貞者正也於時配冬冬以物之終納幹正之道若以五行言之元木也亨火也利金也貞水也土則資運四事故不言之若以人事則元為仁亨為禮利為義貞為信不言智者謂此四事因智而用故乾鑿度云水土二行兼智兼信是也初九龍勿用者潛隱也龍者變化之物喻天之陽氣初九建子之月陽氣始動於地中既未萌芽猶是潛伏比聖人有龍德時未可行惟宜潛藏韜光遁世故言勿用九二見龍在田利見大人此當建丑之月陽氣發見文明顯著故言在田也利見大人者此以人事明之猶似聖人道德漸顯為天下衆庶之所利見若夫子教于洙泗人虛往實歸見者皆利故稱大人九三君子終日乾乾夕惕者厲無咎者若如也厲危也既居下卦之上不可驕盈入上卦之下心懷猶豫故曰終日乾乾從晝至夕常懷憂惕若有危厲如此戒懼乃得無咎先儒云若文王反國大釐政之日九四或躍在淵無咎或疑躍跳也陽氣漸盛猶龍躍在乎淵如聖人位漸尊髙欲進王位心懷疑慮未敢果決相時而動故得無咎若武王觀兵孟津候時而進合經常道故無咎九五飛龍在天利見大人如聖人有聖德而登盛位為天下衆庶利見故云利見大人夫龍之為物在地則行在淵則躍在天則飛上九亢龍有悔亢極也驕也以陽氣盛極喻之聖人久處君位不能謙和自守而為驕亢故致悔恨先儒云但九五之位亦有大聖而居者亦有非大聖而居者非大聖而居者不能免其憂悔猶如堯之末年四凶在朝是以有悔用九見羣龍無首吉者用總也此九陽之德也謂聖人用此九陽之德不可驕盈為物頭首更在謙柔卑退降情接下如此乃吉故曰無首吉也象曰天行健君子以自強不息行者運動之稱健者強壯之名所以乾稱健者以其運行不息無時虧退故宋衷云晝夜不懈以健詳其名餘卦各當名不假於詳也君子以自強不息者凡言君子聖賢之通呼故堯舜一日萬幾文王日昃不暇食仲尼終夜不寢顔子欲罷不能自已蓋是修德乾乾無時休息也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆象曰地勢坤君子以厚德載物初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也六四括囊無咎無譽象曰括囊無咎慎不害也六五黃裳元吉象曰黃裳元吉文在中也上六龍戰于野其血玄黃象曰龍戰于野其道窮也用六利永貞象曰用六永貞以大終也坤元亨利牝馬之貞坤地也順也地之為體能生始萬物各得亨通故有元亨也利牝馬之貞者地體必以柔順而為其正故借牝馬而為其貞牝馬是柔順之物所以將馬為喻馬行地能窮其邊疆是明地有廣之德故先儒云在天為龍在地為馬君子有攸往者明君子但以柔順為德又復行其貞正故利有所往也先迷後得主利者夫隂之為道不可首倡居先若在陽氣之先則不能發生滋育必待陽而為首所以後得主利也猶如臣子處君之朝順事主終在家為迷得主為利也西南得朋者西南坤位是隂也今以隂就隂是得朋也東北喪朋安貞吉者東北艮位為陽也西南隂類往雖得朋必無所利若能喪失朋而就陽則獲安靜貞正之吉以人事明之猶人臣離其黨入君之朝女子舍其家入夫之室是也象曰地勢坤君子以厚德載物者天圓地方是形不順也其勢承順天道之常故曰地勢坤也君子當須以容厚為德包載萬物象地之道廣育也初六履霜堅氷至者初六隂氣之微要假積漸以成其功故引履霜以為其喻且五月一隂爻始生九月五隂始為霜降至于十一月乃至堅氷此明禍福之由積久乃顯所以防萌杜漸慎終於始故文言云臣弒其君子弒其父猶辨之不早辨也六二直方大不習無不利六二居中得位盡地之美故有三德直方大生物不邪直也地體安厚方也無所不載大也既有斯德盡地之善故不假積習而無不利施之於人為臣忠為子孝與朋友信故也六三含章可貞或從王事無成有終者六三既居上位有造為陽之事者含章美之德待時而發可以得貞之吉既居臣體不可先倡或從王事者言其不敢自專也無成有終者不敢居事之先主成於物惟順君命而成其終六四括囊無咎無譽者括結也囊所以盛物喻人心藏智也既是隂位不可顯發亦猶不遇其時閉而不用也故曰括囊也戒慎自守不與物忤故曰無咎也德既不施無聲譽之美故曰無譽也六五黃裳元吉者五是貴位六以隂居之是臣道極貴者也黃是中之色也裳是下之飾也上衣比君下裳法臣六五既是臣體不可比衣故云黃裳以表臣道黃中之美也以文德居中盡臣之善故獲大吉也上六龍戰于野其血玄黃者上六隂極似陽故稱龍也隂既強盛則侵於陽故與陽氣之龍交戰也戰于卦外故曰野也隂陽俱傷故有玄黃之色也陽色玄隂色黃也用六利永貞者用總此六爻之義也坤體柔順不可用之剛暴故須永長貞正則能廣大而終也乾吉在無首坤利在永貞震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧象曰雲雷屯君子以經綸初九磐桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也六四乘馬班如求婚媾往吉無不利象曰求而往明也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也屯元亨利貞者屯難也盈也天地造始剛柔始交動則難生故曰難也元大也以天地始交為難由難始大通也故曰元亨因此大通而乃以行貞正故曰利貞也勿用有攸往者攸所也當屯難之時小人道長君子道消若有所往即為小人侵害故勿用有所往也利建侯者處屯難之時弱求於強民思其主之時故利建君侯以為民主詩云百姓盈盈匪君子而不寧是也象曰雲雷屯君子以經綸者李氏云雲隂也雷陽也隂陽二氣相激薄而未通感情不相得故難生也君子處屯難之時不得安然無事經營綸理以輔屯難也初九磐桓利居貞利建侯者磐桓是進退不安之貌也初九以剛陽之德處羣隂之下即是用謙為體以貴下賤者也時未可通磐桓不安但以守正而不失其居故曰利居貞也處難之時以謙得衆民思其君之時故利封建君侯以為民主也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字者邅回也字愛也處屯難之時強者陵弱六二是九五之匹時逢險難與初相近情不相得被初為難不獲前進故邅回也乘馬班如者班旋不進貌也二既去五既逺但乘馬班旋而不敢前進女子貞不字者二是五之匹故執貞奉五而不受初之字愛也十年反常難道乃通故受五之所愛矣易之為書曲暢義理反明人事所言女子不字亦猶忠臣遇難上下暌違守節不違其如蘇武困于單于後乃歸漢也六三即鹿無虞惟入于林中君子幾不如舍往吝者即就也虞是掌山澤之官也六三處屯難之時隂先求陽弱者求強而六三既無正應往依於五五又有應在二而六三若往就五五所不納猶如獵鹿要假虞官揆度山川知鹿所在既無虞人徒入于林終不獲鹿故君子見此不如棄舍若強就之徒勞而已終至悔吝故略例云見情者獲直往即違是也六四乘馬班如求婚媾往吉無不利者六四意就初九見二與初相近疑二與初相合心懷嫌疑故乘馬班旋而不敢進今六二不從於初而六四見其情狀可以就往初九必獲媾合是以往獲吉而無不利言兩情相得也九五屯其膏小貞吉大貞凶者九五既處尊位當屯難之時固宜拯弱救衰濟民危難而乃獨應於二即是用心𥚹狹所濟不廣處難以斯乃非大人𢎞博之道即是小貞吉大貞凶也膏喻恩澤施惠之義上六乘馬班如泣血漣如者居隂柔之質而無應援處難之時不能自濟雖復乘馬之班旋而無所適故泣血沱嗟滅亡在近説文云漣如泣垂下之貌也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也象曰山下出泉蒙君子以果行育德初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也九二包蒙吉納婦吉子克家象曰子克家剛柔接也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也六四困蒙吝象曰困蒙之吝獨逺實也六五童蒙吉象曰童蒙之吉順以巽也上九擊蒙不利為寇利禦冠象曰利用禦寇上下順也蒙亨者蒙者童稚之名暗昧之義處童蒙之時所願獲通故曰蒙亨匪我求童蒙童蒙求我者匪非也童蒙者謂五也我謂二也五處童蒙之時當求九二之明師也再三瀆瀆則不告者瀆亂也蒙昧之人心多疑惑若明師與之決蒙須一理而説使其曉悟若其廣説引諭至於繁多即蒙者瀆亂亂即還同不告利貞者蒙而未曉心須養正乃通至聖之功也象曰山下出泉蒙君子以果行育德者王氏云山下出泉未知所適蒙之象也君子處是時而未獲通當須果決為行育養已德德立道成可以適蒙之險初六發蒙利用刑人用説桎梏以往吝者初六雖是暗昧而與九二相近即是親比明師以去蒙暗蒙既顯發即心無凝滯乃能利用刑罰罪人又能脫去罪人桎梏之象言其明於法律舉事合宜凡刑罰之道不可常行鞭撲不可弛之家刑罰不可弛之國若用刑不已民所不堪即有悔吝之道故曰以往吝爾雅云杻謂之桎械謂之梏也九二包蒙吉納婦吉子克家者凡言婦者配已成德九二剛陽之德而居中羣隂悉來物來歸已而能納之故曰包蒙吉也心既𢎞通不拒於物即配德者歸焉故曰納婦吉也剛而處中納此匹配是能幹濟家事施之子孫而能克荷家事故曰子克家也六三勿用取女見金夫不有躬無攸利者蒙之為體隂先求陽弱先求強六三是隂柔即是先求上九者也喻之人事是女先求於男也女以婉順為德待禮而行今既先求於男故不可取也見金夫不有躬無攸利者金剛也上九剛夫而乃往就之是無閨閣之德故不可取之而無所利也六四困蒙吝者既不近明師無人顯發其暗深可鄙也六五童蒙吉者柔而處尊不自任察但委付於二不勞已之聰明猶如童稚之人自可獲吉如成王委用周公之義上九擊蒙不利為冦利禦冦者上九陽明之德處衆隂之上能于衆隂擊去蒙暗故曰擊蒙也衆隂親託皆願求安能為羣隂去除冦難則荷戴彌深若因人之隙便生苟且而以取之則衆隂叛矣故云不利為冦而利用禦冦也乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也象曰雲上于天需君子以飲食宴樂初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也九三雷于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也六四需于血出自穴象曰需于血順以聽也九五需于酒食貞吉象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也需有孚光亨貞吉者需待也乾健獲進坎險在前畏而不進故稱待也凡人待物必須有信信既立矣即道德亨通于正獲吉故曰光亨貞吉也利涉大川者以信待物又以乾之剛健不患于險故可濟涉大川不憂沉溺也象曰雲上于天需君子以飲食宴樂者坎為雲也乾天也雲上于天待時降雨是需待之象也君子當其時待養而成故王氏云童蒙已發盛德光亨飲食宴樂其在茲乎初九需于郊利用恆無咎者爾雅云邑外謂之郊也初九去難既逺雖不應于幾速但可以處于郊境之外待時而已也利用恆無咎者既不逼于險難其所營為不失恆道故不陷于咎也九二需于沙小有言終吉沙謂水之旁去難漸近既近于難不能不有責讓之言以其剛健寬而處中待時而進雖有責讓之言終保吉矣故曰小有言終吉也九三需于泥致冦至者九三已逼于難故稱泥泥謂險難也致冦至者招也既逼險難即是招致冦害以相侵敵然而不為遽進猶有待焉故不為困憊六四需于血出自穴者血是隂陽相傷也六四以隂柔之質當剛健之路乾剛既進必見侵傷故曰需于血陽既強盛而前進力不能敵故以出于窟穴而避之故曰出自穴也九五需于酒食貞吉者人之所須以求貴位身既處于尊位而為天下所歸即何更望求焉但施酒食暢其中情而已故曰需于酒食也然至飲食過莭患所生焉故紂作靡靡之樂天下為之離叛必須飲食以宜而不失貞正之道可以獲吉故曰貞吉也上六入于穴有不速之客三人來敬之終吉者上六需難既終不須出穴安于舊位故曰入于穴也速召也三人謂乾三陽也言難道既終三陽務進不待上六召喚而自來矣故曰有不速之客三人來也陽貴隂賤而上六既是隂柔又居無位之地三陽若來必須恭敬之而終獲吉故曰敬之終吉坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也象曰天與水違行訟君子以作事謀始初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九五訟元吉象曰訟元吉以中正也上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也訟有孚窒惕中吉終凶者訟者喧競之名乖爭之義窒塞也惕懼也凡為訟之體必須信實被人止塞若能因此而懷惕懼於中途而止即獲吉也若終竟相訟雖暫獲勝而終必有凶故曰終凶也利見大人者大人能斷枉直不失情理也不利涉大川者爭訟之時人心乖異涉難濟川必見謀害故周氏云與相爭必被襲謀當見墜於深淵也象曰天與水違行訟君子以作事謀始者天自西轉水乃東流二體相違故是訟也君子興為必須謀慮其始若初始分明不相忤犯訟無由生也初六不永所事小有言終吉者爭訟之體剛先犯弱初六既是隂柔不敢先訟九四九四先訟者也往就辨答道理分明不被稽留故不永所事謂不永長為爭訟之事也九二不克訟歸而逋其邑人三百户無眚者克勝也逋逃也九二體剛居隂好為爭訟之事乃與九五相爭也以下訟上以臣訟君勢不可敵爭訟如何得勝故不克訟也然訟既不勝禍患必至懼罪及身遂將逃竄竄歸小邑可免災也若其邑大人強君疑不息必被誅罰故曰三百户乃無眚也六三食舊德貞厲終吉或從王事無成者六三體柔弱順從上九不敢有違所有舊日之恩德而不被黜奪故曰食舊德也然處兩剛之間情不相得以貞自危故曰貞厲也體柔奉上不敢為先但須從上九之王事不敢先成故曰或從王事無成也九四不克訟復即命渝安貞吉者克勝也即就也復反也渝變也四體剛而訟初六初對答道理分明四既不勝於初六故曰不克訟也若因此不勝而能反就初六悔過自新即獲安貞之吉故曰安貞吉也九五訟元吉者餘皆不當尊位悉是爭訟之人九五體尊履正即是斷訟之主剛即無所滯溺中即心無偏曲處位以斯故獲大吉故曰訟元吉也上九或錫之鞶帶終朝三褫之者以剛處上是訟而得勝乃受鞶帶之錫然則不義而富於我如浮雲以訟受榮如何可保故終一朝間三被褫脫不足敬也因訟至錫非德而受故不足敬旦至食時為朝馬云鞶帶大帶衣也坎下坤上師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也六三師或輿尸凶象曰師或輿尸大無功也六四師左次無咎象曰左次無咎未失常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也師貞丈人吉無咎者師者衆也軍旅之名法長之義故陸績云師為衆首法長而行是也以師為正故曰師貞丈人吉無咎者丈人謂嚴毅德長之人可以監臨於衆故曰丈人也夫興師征伐必須有功勞即無罪咎故曰吉無咎也象曰地中有水師君子以容民畜衆者緣地能包水亦猶為師之主容納於民也君子為衆之長當含小過不尚絶嚴容納民人畜聚於衆也初六師出以律否臧凶者律法也否破敗也臧有功也初六為師之首必須齊整師旅而不失法律者也若其失律違法雖見獲功徒勞而已故否之與臧皆見凶也九二在師中吉無咎王三錫命者九二以剛德處中為君委任故曰在師中也既為君所任任大役重必須有功無功即凶故曰吉無咎也吉者有功之辭也王三錫命者以其能招萬邦而有功故君王三度錫賜其命六三師或輿尸凶者六三體質柔弱而復乘剛又無應援若使之行師必見喪敗故曰輿尸而歸凶也六四師左次無咎者以隂得位而無其應無應即不可征伐也得位則可以自處也夫為帥衆而處必須量其便宜取其右背山陵前左水澤而次止之則無咎也又云左是偏將處之右是上將有主死之權也六五田有禽利執言無咎長子帥師弟子輿尸貞凶者以柔處尊不先威猛只是物來先犯者也猶如田之苗稼為禽所犯故用執之言語問其情誅亦無咎故曰田有禽利執言無咎六五體既柔弱不可自行攻伐故任用長子帥領師衆也若任之弟子則致輿尸之凶故莊氏云長子謂九二德長於人也弟子謂六三德劣於物也上六大君有命開國承家小人勿用者上六處師之極即是有功之人既有功勞即天子錫之爵命矣若其功大開國為諸侯若其功小使之承家為卿大夫也若山入有功但錫之金帛不可任之以位故勿用小人必亂邦也大君為天子亦喻大人有天命用之開國小人無命止於為盜坤下坎上比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也象曰地上有水比先王以建萬國親諸侯初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也六二比之自內貞吉象曰比之自內不自失也六三比之匪人象曰比之匪人不亦傷乎六四外比之貞吉象曰外比于賢以從上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也上六比之無首凶象曰比之無首無所終也比吉原筮元永貞無咎者比是親比之義與人親比自然獲吉故曰比吉也與人親比必須尋其根源筮是問也審其情原方得大永貞是貞正之人與之親比乃得無咎若遇姦邪之人則不能保其親比之道不寧方來者比是寧樂之時亦猶人君有德不寧之方悉來歸化焉後夫凶者比道宜速若處後而來被人疏隔所以凶也象曰地上有水比先王以建萬國親諸侯者子夏傳云地得水而柔水得地而流是也先王以建萬國親諸侯者萬方各據境域謂王者封建有功之臣也親諸侯謂爵賞及親友令助君之化也初六有孚比之無咎有孚盈缶終來有他吉者處比之初唯須以信待物先須以信始得免咎故曰有孚比之無咎初六既無偏應來者皆與相親著信立誠盈溢于質素之器心無偏黨應者非一故有他人而來終亦不相拒故有他吉六二比之自內貞吉者專應于五不能更比他人劣于初六故得當家內正之吉也六三比之匪人者匪非也處比之時雖近二四情不相得二四柔諂非已所親故曰匪人謂非已親比之人也六四外比之貞吉者本應在初初既逺即親于所近九五有德行可以親比之故稱貞吉也九五顯比王用三驅失前禽邑人不誡吉者處比之時居得尊位固當心無偏黨來者比親而乃獨應于二顯明親比之道是用心𥚹拘故曰顯比也夫不能普及于物而乃親于二亦如王用三驅田獵相似凡三驅之禮受來惡去故逆來趣已者捨之背己而走者射之故失前禽也然有中正之德不妄加之征伐所有背叛必須攻討以其當邑之人不須防誡而得吉矣獨親邑人心不𢎞通非君上之道可以為君上之使故云上使中也上六比之無首凶者處比之終最在于外衆皆先至而相親比已獨在後違衆叛義所以凶也若禹會諸侯於塗山防風氏後至禹乃戮之此之謂也乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也象曰風行天上小畜君子以懿文德初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也九三輿説輻夫妻反目象曰夫妻反目不能正室也六四有孚血去惕出無咎象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也小畜亨者畜謂止積制遏之名乾陽上進巽體柔順陽氣上升隂不能固所畜微劣故曰小畜以陽氣得通故曰亨也密雲不雨自我西郊者隂既微劣不能止畜于陽陽氣上通雖復至盛密雲而不能施降于雨但止在西邑之郊而已亦喻德薄位尊不能廣其恩惠所化止于一隅也象曰風行天上小畜者風諭恩教之義風既行于天上即是教化不及于下故云小畜象也君子以懿文德者懿美也化既不行可以修美文德之行待時乃施也初九復自道何其咎吉者復反也處畜之初畜道未盛往之于四無所見閡猶似反歸之家何慮咎害所以吉矣九二牽復吉牽挽相連也畜道未極猶可牽挽而進反復就五可以吉也九三輿説輻夫妻反目者夫小畜之道先通後畜至于九三畜道已成不可前進故輿敗輻破難可以行故輿説輻也三是陽卦之極上是隂卦之極隂而制陽亦猶女之制夫室家不正反目相視故曰夫妻反目也六四有孚血去惕出無咎者孚信也惕懼也血傷也九三前進四塞其路必被侵傷故稱血也畏三侵害故惕懼也然則上九處物之極而惡于三乃得安其位不被侵傷遂得血去而畏懼總除也九五有孚攣如富以其鄰者二欲上升而五不相拒也二牽于五五又攣二合信同體牽攣而行故曰有孚攣如也五處尊位富貴昌盛不獨已有而與于鄰鄰謂二也上九既雨既處尚德載婦貞厲月幾望君子征凶者上九雖是陽爻而統屬隂卦以上九隂極而致九三之陽陽不得通故既雨也不被陽侵而安其位既處也以隂制陽是婦制其夫臣制其君正之危也故曰婦貞厲處隂卦之極積久方顯其猶人之積尚道德可以運載于下故曰尚德載也隂之盛極如月近望以敵日也故曰月幾望也處盛極之地不可以盈盈而求進必見侵傷故君子之行亦凶故曰君子征凶也周易口訣義卷一
