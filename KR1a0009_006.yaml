body:
  text: 周易口訣義卷六唐史徴撰下經三漸至未齊艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也象曰山上有木漸君子以居賢德善俗初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不復失其道也利用禦寇順相保也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也漸女歸吉利貞者漸者徐進之名歸嫁也女子生有外成之義以夫為家故嫁為歸也女人之嫁備禮乃行吉斯善矣故曰女歸吉也漸進禮全嫁娶之正故曰利貞也象曰山上有木漸者山上生木漸漸進長因山而髙非是忽然而起故曰漸之進也君子以居賢德善俗者君子求人須求賢德使其居位發施教令善誘風俗也侯果云賢者德成之名德是資賢之實也初六鴻漸于干小子厲有言無咎者鴻是水鳥以况從下至髙漸進之義干水涯也鴻之進至于水涯故曰鴻漸于干也進未得位必被凌辱乃困于小子危于謗言故曰小子厲有言也雖困于小人之言而但懷道德安能損于君子之道故曰無咎也干亦喻水上非安之所更以無應也六二鴻漸于磐飲食衎衎吉者磐者山中磐石也以柔處中進而得位猶鴻鳥栖于磐石得可安之地故曰鴻漸于磐既得可安之地居中有應吉福至焉故飲食豐飽不素飽而已故曰衎衎吉也衎衎是喜樂之貌也九三鴻漸于陸夫征不復婦孕不育凶利用禦寇者陸是山頂之髙處也九三處下卦之上如山之頂如鴻升進至于山頂故曰鴻漸于陸也三之于二同處一體其猶夫婦一體之義今九三務進不肯却回即是夫之征進不肯反家故曰夫征不復也九三前進與四相得貪務邪偶即婦亦不能守貞非夫而孕故不能育故曰婦孕不育也見利忘義貪進忘舊凶之道矣與四相得邪偶相與恐人為難以為間阻故利用防禦寇害順相保也六四鴻漸于木或得其桷無咎者桷榱桷也以柔得位如鴻栖于平直之枝堪榱桷之用是可栖息之處故曰鴻漸于木或得其桷與三相得心無憂慮雖乘剛相合固無咎也九五鴻漸于陵婦三嵗不孕終莫之勝吉陸績云陸陵俱是髙處然陵卑于陸也九五進處尊位如鴻進髙以止于陵故曰鴻漸于陵也正應在二隔于三四不得與應相交是兩情勤慕阻隔不通故曰三嵗不孕也二與五各懷中正九五是君三四是臣以臣欺君勢不可勝三嵗以來道成事濟久塞其路不得勝于君五二各得其願故曰終莫之勝吉也上九鴻漸于陸其羽可用為儀吉者三之于上皆處山頂並稱陸也然上九最居卦上是能為超勝進處髙潔不纍名位德髙之人無物屈心不亂其志故其羽翼清虛可為世之儀表峩峩清竒可貴可則故曰其羽可用為儀吉也兑下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也象曰澤上有雷歸妹君子以永終知敝初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也九二眇能視利幽人之貞象曰利幽人之貞未變常也六三歸妹以須反歸以娣象曰歸妹以須未當也九四歸妹愆期遲歸有時象曰愆期之志有待而行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也歸妹者女人以嫁為歸歸妹即是從姊而嫁故曰歸妹也然古者諸侯一娶九女姪娣從之虞翻云九女者貴其男女繼嗣宗享不絶也征凶無攸利者征謂進而求寵也妹從姊而行固宜卑退敬事女后若妄求進寵希謂並后即有並后之亂凶禍斯至而無利故曰征凶無攸利也象曰澤上有雷歸妹者澤上有雷悅而有動歸妹之象也君子以永終知敝者諸儒于此各以意見互説不同不可隨波而流彌增惑亂今則取師説為義也所以一娶九女者貴其蕃育繼嗣宗享不絶則是永長延祚保后之終若九女無子即絶其後嗣即有不終之敝蓋為正經云天地之大義人倫之終始矣初九歸妹以娣跛能履征吉者少女謂之娣也以兌適震以幼從長非其匹配是從姊而行故歸妹以娣也雖不失其道然幼從長譬之跛足之人足雖蹇跛不妨履踐故曰跛能履妹從姊行不可僣進為嫡即凶為娣即吉故曰征吉也九二眇能視利幽人之貞者位雖不正而居內處中守其卑禮不能妄進猶如眇目之人不妨所視故曰眇能視也居內守中不失常道是居幽而不虧其正故曰利幽人之貞也六三歸妹以須反歸以娣者六三處下卦之上位又不正即是僣進求為室主室主猶存進不值時故宜待時故曰歸妹以須也既不值時固當反歸且為娣從俟時而進故曰反歸以娣也九四歸妹愆期遲歸有時者以陽居陰位不正也下又無應以不正無應而行是為妄進故須愆過於期若有所適候彼道窮盡待時而行然後可往故遲歸有時也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉者居得尊位應在九二是帝王嫁妹以降於二故曰帝乙歸妹袂者衣袖為禮容帝王嫁妹則以衣裳為崇飾也其君即五也應在九二以震適兌以長從幼即是降尊就卑不如以卑就尊合於常道故曰君之袂不如其娣之袂良月陰之盛猶如月近望可以敵日以貴而行以斯適配往亦必合故月幾望吉幾近也隂盛為位在於中以貴而行也上六女承筐無實士刲羊無血無攸利者女子之行以承順為德士之為道以下之應命為美今上六居卦之上而無承應其猶女子承捧虛筐空無所有筐本盛幣帛今既空虛即上無所奉故曰女承筐無實也下既無應人不奉命譬之刲刺其羊而無血矣羊本有血今既無血即是教令不行故曰士刲羊無血進退莫與故曰無攸利羊謂六三也離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而況于人乎況于鬼神乎象曰雷電皆至豐君子以折獄致刑初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五來章有慶譽吉象曰六五之吉有慶也上六豐其屋蔀其家窺其户闃其無人三嵗不覿凶象曰豐其屋天際翔也窺其户闃其無人自藏也豐亨者豐是𢎞大之名饒益為義財德盛大故謂之豐財多能濟於衆德大無所不通故曰豐亨也王假之者假至也王能至于豐大之德無所不周也勿憂宜日中者勿無也德能廣大無所不通如日之中盛明照臨萬國德備如此無復憂慮為天下主須令微細隱滯者獲通豐亨勿憂之德故宜日中也象曰雷電皆至豐者雷天威也電光輝也威光並至所以豐大也君子以折獄致刑者折斷也致至也君子法天而行故折斷獄訟須察虛實至于刑罰不濫及無辜也文明以動不失情理也初九遇其配主雖旬無咎往有尚者以陽應陽旬為均平也豐大之世文明以動所貴光大以合時宜今初九與四俱陽爻兩體均平安得有咎故曰遇其配主雖旬無咎能相光大往有嘉尚也六二豐其蔀日中見斗往得疑疾有孚發若吉者處豐之時貴于光顯而惡暗昧今六二以隂之質應五又隂是重暗之極故日中盛明乃見斗星故曰豐其蔀日中見斗也蔀者曖光明之物也往就于四四又暗昧不能啓發其明心生狐疑而不自決居乎本位則暗疾未除往之與來不免暗疾故曰往得疑疾然履中居位處暗不邪但懷忠信不為暗疾所纍而能啓發其志故獲吉矣故曰有孚發若吉也九三豐其沛日中見沫折其右肱無咎沛幡幔禦蔽光明之物也沫是微暗不明之謂也九三應在上六志在乎隂雖免豐蔀見斗愈乎以隂處隂而猶豐沛見沫是日中盛明而見微沫矣故曰豐其沛日中見沫處豐大之時而見物微沫斯則不可施于大事其猶人之所用在於左右之肱今右肱既折况復見物微沫只可自守而已乃得無咎故曰折其右肱無咎為施明即見昧施用則折肱矣九四豐其蔀日中見斗遇其夷主吉者九四以陽居隂而懷暗昧如日中見斗也夷平也應在初九以陽適陽二體均平能相顯發若遇初九夷主所以獲吉故曰遇其夷主吉也六五來章有慶譽吉者以隂之質來居陽位是暗而求明既居尊位能獲章美慶譽所以吉是光大彰顯其德矣上六豐其屋蔀其家窺其戶闃其無人三嵗不覿凶者屋者藏隂隱之處上六以隂處外而不居其位即是幽隱之人絶迹深藏者既是藏隱恐為人所見故豐厚其屋而又蔀覆其家假使窺覷其户隱翳之深而闃寂不見其人故曰豐其屋蔀其家闃其户闃其無人也亦是棄其所止外處深藏以髙其行然處豐大之時即是明君之德光被天下野無遺賢固合睹斯明代居位佐時共施政事而反以自隱三年者豐道已成而猶不見所以致凶治道未濟隱藏猶可治道既濟何為藏身不出失時尚凶况復更藏凶其宜也艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉象曰山上有火旅君子以明慎用刑而不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也六五射雉一矢亡終以譽命象曰終以譽命上逮也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也旅小亨旅貞吉者旅者客羇旅之稱也旅人觸目乖阻困於途路求容僅存假道濟通所通非大但小亨而已故旅小亨也羇旅而得小通是旅之正吉故旅貞吉也象曰山上有火旅者火在山上因風而起逐草而行勢不久留之象也君子以明慎用刑而不留獄者旅卦而引斷獄案六十四卦有文明者多稱用刑今旅卦有艮止離明止即審慎用刑明即不濫不枉故聖人之意取其明察止審不妄刑罰蓋以人命至重故陽膚為士師曽子誡之曰治獄之道如得其情則哀矜而勿喜死者不可復生斷者不可復續是也初六曰旅瑣瑣斯其所取災者瑣瑣細小卑賤之貌也處旅之時最居人下是卑賤細小矣故旅瑣瑣也身處人下不得所安有所興為災禍自至故曰斯其所取災六二旅即次懷其資得童僕貞者次是旅店旅人所居之處也六二以柔居中得位乘上即是旅人得其所安只可店舍而處故曰旅即次也處旅行謙不為剛猛但有童僕之正懷來資貨不慮喪失故曰懷其資得童僕貞也九三旅焚其次喪其童僕貞厲者九三處下卦之上上無應與初二相得遂欲自尊而施惠於下當旅之時不能謙和靜慎而乃預萌侵權為君所疑遂被黜奪焚其次舍是喪童僕之正而身危矣故曰喪其童僕貞厲九四旅于處得其資斧我心不快者九四以陽居隂即懷謙之道處旅行謙雖不得平坦之處而得用斧之地謂除荆棘而治次舍以自居之故曰旅于處得其資斧也寄旅求安不得平坦而得荆棘之地即其心不樂故曰我心不快也六五射雉一矢亡終以譽命者羇旅之時不可以處盛位縱使居之終不可保有喻射雉一矢射之不中而失其矢雉雖有而終不可得故曰射雉一矢亡也然五居文明之中能審禍福之機不乘剛而専權但棄下而恭願奉上故終美譽而見命也上九鳥焚其巢旅人先笑而後號咷喪牛于易凶者居髙危以為宅鳥巢之象旅人最處髙位衆心所嫉居嫉害之地因被侵奪必致凶塞得髙位而先笑也凶禍至而後號咷也侵奪而似鳥焚巢牛是稼穡之資喪失其牛理在不難衆所同嫉物莫之與危而弗扶無人以為聞報無所依託即傷切甚矣故于易凶巽下巽上巽小亨利有往往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人象曰隨風巽君子以申命行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也九三頻巽吝象曰頻巽之吝志窮也六四悔亡田獲三品象曰田獲三品有功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也巽小亨者巽是卑順之名和入為義故謂之巽也夫人用巽必須恭儉莊敬進退合宜若過于卑巽踰尊卑之分敬恭不合禮即所通非大故曰小亨也利有攸往者巽順以行物不違拒故曰利有攸往也利見大人者人用巽順即無往不利大人用巽其道愈隆巽順之美上下皆須之故曰利見大人也象曰隨風巽者按説卦云巽入也風之所入物無不順風相隨而行故曰隨風巽也君子以申命行事者風行草偃亦有王者風教行于天下意故君子象此申其命令行其政教之事也初六進退利武人之貞者出令之初人未從化心懷猶豫進退遲疑申命之初人未信服成命齊邦莫過威武以整齊之故曰進退利武人之貞也九二巽在牀下用史巫紛若吉無咎者史謂祝史巫謂巫覡皆是接事鬼神之人九二處巽之中在下位而以陽居隂卑巽而順故曰巽在牀下者卑謙過甚失于正道咎過生焉然鬼神無形所在怠慢九二卑恭如是事神祗而獲多福故曰用史巫紛若吉無咎也紛者盛多之貌也九三頻巽吝者頻是頻蹙不樂之貌也九三體剛居正為四所乘志意窮屈不得舒暢故懷頻蹙即是鄙吝之道故曰頻巽吝六四悔亡田獲三品者六四乘九三之剛所以有悔然得位乘五上奉君命所以悔亡親近至尊即是權臣以斯行命必有功勞譬之田獵而獲三品之物故曰田獲三品也一曰乾豆為豆實以奉宗廟二曰賔客以助君明目達聰三曰充君之庖厨供君之費也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉者五以剛居位違于謙巽故有憂悔能用中正以宣命令人不敢違所以悔亡而無不利也初施命令新用剛直人未從化故曰無初以中正之德宣布命令人漸從化故曰有終也申命令謂之庚以人迷既久不可卒然而理故先申三日殷勤勸諭使其變惡從善令著之後復再申三日人若不從即當誅罰民服其罪所以獲吉故曰先庚三日後庚三日吉也上九巽在牀下喪其資斧貞凶者處巽之極言巽過甚似巽于牀下斧者是斬斷之物喻決斷威制今既處上固合威斷臨下而乃過于謙即是喪其威斷是正道之失故曰喪其資斧貞凶也兌下兌上兌亨利貞彖曰兌説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉象曰麗澤兑君子以朋友講習初九和兌吉象曰和兌之吉行未疑也九二孚兌吉悔亡象曰孚兌之吉信志也六三來兌凶象曰來兌之凶位不當也九四商兌未寧介疾有喜象曰九四之喜有慶也九五孚于剝有厲象曰孚于剝位正當也上六引兌象曰上六引兌未光也兌亨利貞者兌澤能潤悅萬物故謂兌悅也喻人君能以兌澤潤于萬人惠流人悅無所不通故曰兌亨也以悅相親恐陷邪諂其所利者在貞正故曰利貞也象曰麗澤兌者麗猶連也兩澤相連上下俱悅故曰麗澤兌也君子以朋友講習者先儒云同處師門曰朋共執一志曰友友猶黨也必須友者學記云獨學無友即孤陋寡聞謂朋友聚居講解道義修習文禮相悅之盛莫盛于此故鄭衆云樂耽于酒則有沉酗之凶志纍于樂則有傷性之患所以君子樂之美者莫過于尚詩書敦習道義教之盛矣樂在斯焉初九和兌吉者處悅之初而無私應與衆和悅天下皆親以斯而往何所疑乎所以獲吉也九二孚兌吉悔亡者以剛處中是懷信實之人悅而施信則吉從之故曰孚兌吉失位而處所以有悔志在忠信所以悔亡也六三來兌凶者以隂居陽位是來求悅以不正之身妄來求悅是佞邪之道所以致凶也九四商兌未寧介􅍚有喜者商謂商量裁制之謂介隔也六三以諂侫之身而近至尊妄求干寵夫侫邪之人國之患害今九四既是權臣為君委任固宜與君商量裁制介隔邪侫之人內掌樞機以匡王室經營倫理未遑安寧故曰商兌未寧也介疾是隔邪與君除害四方安靜故有喜慶故曰介􅍚有喜也九五孚于剝有厲者剝是小人道長之稱也九五為悅之主固宜中正自安惟賢是任而乃反親上六昵狎小人遂為小人所害危厲故曰孚于剝有厲書曰逺耆德比頑童是為亂風也上六引兌者六以隂最居悅後是自靜退不妄求進必須他人牽引乃從衆悅故曰引兌也坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也象曰風行水上渙先王以享于帝立廟初六用拯馬壯吉象曰初六之吉順也九二渙奔其機悔亡象曰渙奔其機得願也六三渙其躬無悔象曰渙其躬志在外也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也九五渙汗其大號渙王居無咎象曰王居無咎正位也上九渙其血去逖出無咎象曰渙其血逺害也渙亨王假有廟者渙者離散之名緩釋為義然則小人遭難奔走逃散逃散方始獲濟大德之人處難之時能建功立德散釋險難以安時人故謂之渙也能釋險難人皆獲濟所以亨通王能釋難而通天下太平至於建立宗廟德洽人神雖復大川亦可濟涉險難既釋宜𢎞道化利物聚人莫過於正故曰利涉大川利貞也象曰風行水上渙者風行水上激揚波濤散釋之象先王以享於帝立廟者先王既釋險難民泰時安可以享獻上帝建立宗廟祭祀祖考告以太平也初六用拯馬壯吉者拯拔也初六處難之初乖散未甚可以用馬拯拔得其志而逺難難初未至危劇相時而行是壯而獲吉也九二渙奔其機悔亡者機是案機以承物也謂初與二俱無應相得既托於初得其所安逃難離散而奔故曰渙奔其機悔亡也六三渙其躬無咎者渙之為義內險外安六三有應於外不顧所守脫身而出與剛合志故得悔亡故曰渙其躬無悔也六四渙其羣元吉渙有丘匪夷所思者六四既在險外即是已險難之人近於至尊為君委任內主樞密外宣王命而能散羣衆之難以安綏萬人也而獲其大功所以元吉故渙其羣元吉然為君所任任重憂深雖能散衆之難猶疑散難之中恐有未平丘墟之險恆懷思慮心未得安故曰渙有丘匪夷所思也丘丘墟也夷平也九五渙汗其大號渙王居無咎者人之驚怖既汗從體流故以訓釋為汗也九五處於尊位而能發號施令大散天下之險危故曰渙汗其大號也為渙之主能散險難若非王者正位則不能然正位不可假人故王居無咎也上九渙其血去逖出無咎者血傷害之義逖逺也上九所居最是險外是不為物之侵傷逖逺而去拔出險外故曰渙其血也散患於逺害之地誰能與我為咎也兑下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民象曰澤上有水節君子以制數度議德行初九不出戶庭無咎象曰不出戶庭知通塞也九二不出門庭凶象曰不出門庭凶失時極也六三不節若則嗟若無咎象曰不節之嗟又誰咎也六四安節亨象曰安節之亨承上道也九五甘節吉往有尚象曰甘節之吉居位中也上六苦節貞凶悔亡象曰苦節貞凶其道窮也節亨者節制度之名節止之義故謂之節也節制要在得宜尊卑有别其道乃通故曰節亨也苦節不可貞者為節之道必須當理若過刻薄傷於物情物所不堪非為節道不可為正故苦節不可貞也象曰澤上有水節者澤陂陷之處也澤之大小各有區别今水居節上隨其大小得宜各有止節故為節象也君子以制數度議德行者數謂禮數等差也度謂上下優劣也議人德行輕重得宜是皆節制度數之義所以周禮五等諸侯所受錫命皆有度數是也初九不出户庭無咎者節者制度之義今初九處節之初即是初制法度宜其慎密不令泄露若教令未宣而乃泄露即人心多險姦詐生焉若慎密不失施制合宜應時無偽乃得無咎知通塞矣九二不出門庭凶者初為制度之始法制未成固宜慎密今至九二是法制已成而猶溺之失時之中乃乖於理失時之極所以致凶故曰不出門庭凶也六三不節若則嗟若無咎者處節之時故宜各得其序不相乖越今六三以隂居陽以柔乘剛以為驕僣而不為節禍將及身以至哀嗟故曰不節若也禍自已招非人所與無所怨咎於人故曰無咎六四安節亨者以柔得位承順於君是得節之道但稱安行此節而不改變則何往不通故曰安節亨也九五甘節吉往有尚者不苦而美謂之甘也九五為節之主履正居中節以制度不傷財不害人為節而無傷即是不苦而甘所以甘吉矣為節不傷苦而能甘以此而往人所嘉尚故曰往有尚也上六苦節貞凶悔亡者居節之極是過節之中傷於為正物所不堪正之凶矣故曰苦節貞凶若以施人則是正道凶若以苦節於身修已自厲則可以悔亡矣兑下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也象曰澤上有風中孚君子以議獄緩死初九虞吉有他不燕象曰初九虞吉志未變也九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六四月幾望馬匹亡無咎象曰馬匹亡絶類上也九五有孚攣如無咎象曰有孚攣如位正當也上九翰音登于天貞凶象曰翰音登于天何可長也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉初六飛鳥以凶象曰飛鳥以凶不可如何也六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也九三弗過防之從或戕之凶象曰從或戕之凶如何也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也小過亨利貞者小過者過於小事故謂小過也以小事而濟用物乃可通故曰亨也順時矯俗利在歸正故曰利貞也可小事不可大事者世既小通即可正以小事不可正以大事也飛鳥遺之音不宜上宜下大吉者鳥之所栖止於林澤飛而向上則入杳冥羽翮摧頺遺其音響哀以思處願求所安故不止則愈困下則栖於林藪故曰不宜上宜下大吉也此論上乘剛逆也下承陽順也故君子為過矯之行上則逆鱗下則執柔守順故以飛鳥上下而取義焉象曰山上有雷小過者雷本出震於地上今既出至山上過其本處故曰小過也君子以行過乎恭喪過乎哀用過乎儉者小過之世戒其所過小人居之則慢易奢僣故君子為過矯之行過乎恭敬喪孝之禮過乎哀戚費用之宜過於儉約之謂也初六飛鳥以凶者小過之義上逆下順初應在四若往就四則是進於逆也同於飛鳥上而無所措足所以致凶六二過其祖遇其妣不及其君遇其臣無咎者過而得之謂其遇也六二居初之上而居中位是過於初而遇六二也祖始也謂初也妣母之稱也六二居中履正故謂之妣矣已過初遇二位遇母之內處故曰過其祖遇其妣而得位處中不至於僣終守臣位安可有咎故曰不及其君遇其臣無咎也九三弗過防之從或戕之凶者小過之世大者不能立德故令小者僣過驕慢陵上也九三以陽當位又處下卦之上固合防遏小人不令奢僣而九三更應上六與小人同情反為小人所害也故曰弗過防之從或戕之凶也戕者殺害之義也九四無咎弗過遇之往厲必戒勿用永貞者居小過之世小人有過差之行須大德之人防間遏絶不令過差今九四雖復陽爻而不居位故其所過咎責不在已故得無咎九四所以得免咎者以其失位在上卦之下不為過厚之行故得遇其無咎之宜故曰無咎弗過遇之也既無防止遏制之能自守其位則免咎而已若有所往則致危厲故曰往厲也不交於物物亦不親既無人相親是無援助欲有所往必致危厲無所告救故必自戒慎以全其身故曰必戒也既不能裁制小人亦不可任用以其如此故不足長行其正故曰弗用永貞也六五密雲不雨自我西郊公弋取彼在穴者小過者小過於大也隂居陽位是小者過於大隂之盛矣隂止於上陽氣不通雖復至盛密雲止在西郊而不能降其雨以人事明之是隂柔之主以處尊位未能施其風教恩惠及下故曰密雲不雨自我西郊也公者臣之極貴也五極隂盛故稱公也小過之時其過猶小是不能大作猶為隱伏以小德之才治小過之失能獲在穴隱伏之物又如公之弋獵而獲隱伏之獸故曰公弋取彼在穴也上六弗遇過之飛鳥離之凶是謂災眚者處於小過之極是小人過甚不知限際隨至穴極過至穴無所復遇故曰弗遇過之也以小人之行不守限量過而不已遂遭害網亦如飛鳥飛而不已無所栖託必罹矰繳所以凶矣故曰飛鳥離之凶過於亢極以罹其凶是謂不慎其身災眚斯及復何恨哉故曰是為災眚王注過至于亢將何所遇飛而不已將何所託也離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之初九曳其輪濡其尾無咎象曰曳其輪義無咎也六二婦喪其茀勿逐七日得象曰七日得以中道也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也六四繻有衣袽終日戒象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也上六濡其首厲象曰濡其首厲何可久也既濟亨小利貞者既盡也濟渡也剛柔得正上下相應故曰既濟也萬物盡皆濟渡若小者不通則無盡濟之理今小者猶尚通亨則柔大之物自然獲濟故曰亨小也物既盡濟非正不可故曰利貞初吉終亂者此設戒之辭當既濟之時若能戒慎謙守不為驕恣則既濟無窮安有危亂及已若其不能居安慮危慎終如始則既濟其極危亂至矣故王傳云終亂不如自亂由止故亂是也象曰水在火上既濟者孔義云水在火上炊㸑之象飲食以之而成性命以之而濟是故既濟象也君子以思患豫防之者處既濟之時舉事合宜恣情所欲固當恭儉保守存不忘亡思慮後患豫為防慎故書云制治于未亂保邦于未危是也初九曳其輪濡其尾無咎者初九處既濟之初是始濟渡也始濟險難未至乾燥之地猶拖曳其輪濡濕其尾言其勞苦方始獲濟其于義理安有咎哉故曰無咎也六二婦喪其茀勿逐七日得者茀者婦人之首飾也六二居中履正而應於五雖與初三相近情不相得遂被初三相奪以人事明之其猶貞潔之婦容儀光麗夫暫不在遂被他人侵陵頭上花飾強為竊奪故曰婦喪其茀稱婦者明已自有夫而被見侵當既濟之時法令明峻不容邪道婦既執貞如此衆尚節志皆願助之假使逃竄勢不能久不過七日必見執獲故曰勿逐七日得也九三髙宗伐鬼方三年克之小人勿用者處既濟之時居文明之末將入險難是居衰而能濟其猶殷王髙宗諒隂三年盛德中興克伐鬼方以其盛德始興不能即勝故三年已後乃始克勝故曰三年克之也髙宗者武丁之號殷之賢王挺濟衰世能伐逺方若小人居之必致危亂不可任用故曰小人勿用也六四繻有衣袽終日戒者繻宜曰濡是霑濕之義袽者衣敝爛者可以塞漏舟也六四處得其位而與三五相近情不相得常慮危患及身如舟之穿漏而能得濟渡者必須敝爛之衣塞之免為濡溺方遂獲濟故曰濡有衣袽也鄰不親而得全者須防戒得免故曰終日戒也九五東鄰殺牛不如西鄰之禴祭實受其福者牛祭之盛也禴是殷時春祭之名四時最薄之祭也九五處既濟之時得居尊位天下盡皆獲濟亦何所營為喻天下太平不勞思慮其所務者莫過祭祀祭祀之本莫過修德今九五履正居中修德如此但可禴祭省薄精誠致敬合時之宜則神明降福假使東鄰殺牛豐厚之盛神靈不饗不如西鄰薄祭吉福大來此蘋蘩可薦之義故惟德是馨矣上六濡其首厲者處既濟之極物極則反遂至於未濟者則首先犯焉若既濟之時守謙保位無為無事安能有咎今既進而不已遂遇危難故濡其首也既被濡者將陷於難危莫甚焉故曰濡其首厲也坎下離上未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也象曰火在水上未濟君子以慎辨物居方初六濡其尾吝象曰濡其尾亦不知極也九二曳其輪貞吉象曰九二貞吉中以行正也六三未濟征凶利涉大川象曰未濟征凶位不當也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也未濟亨者未濟是未能濟渡之名喻人德薄居位才德劣小不能拔濟危難必須任之于賢委之于德則有可濟之理故曰未濟亨也小狐汔濟濡其尾無攸利者汔將盡之名其猶小才之人不能濟拔險難譬之小狐渡水智力羸劣必須待水乾淺方可涉川未及於岸力已疲憊遂濡濕其尾幾至沒溺豈有利焉故曰濡其尾無攸利也象曰火在水上未濟者夫水火之用相合而成即能濟人之性命今火居其上而上炎水流於下而下注火水各抗焉能烹飪故為未濟也君子以慎辨物居方者君子見未濟之患以謹慎為用故分辨事物各安其居也初六濡其尾吝者初六處未濟之初最居險下而欲強進求濟其如力薄何所以進未達岸濡濕其尾故曰濡其尾也然體雖隂柔不為剛狠之性而乃猶不思反以斯而往頑亦甚矣故曰吝也九二曳其輪貞吉者九二以剛居中而應於五為君委任即是救難之人然二雖處險中不為難之所溺故經綸屯蹇任重憂深所以曳拔其輪以出險外故曰曳其輪也救難濟危莫過于正故曰貞吉也六三未濟征凶利涉大川者六三處未濟之時以隂柔之質失位之正安能自濟若征而求濟必致凶危故曰未濟征凶也然九二剛陽為君委任即是能救難之人六三若能委質親二即不慮沒溺自然獲濟故曰利涉大川也九四貞吉悔亡震用伐鬼方三年有賞于大國者九四履失其位所以有悔然出險難之外居文明之初接近于君志行其正所以獲吉憂悔乃亡故曰貞吉悔亡也為君所任正志既行靡有禁其威者故震發威怒以伐逺方故曰震用伐鬼方鬼方者興衰之征也每至興衰取義焉四方文明之初其德未盛不能即服故曰三年也五處中位體包明德既居尊位不奪物功九四既有功勞而乃以百里之國賞之謂封以茅土故曰有賞于大國也六五貞吉無悔君子之光有孚吉者以柔居尊所以有悔然以文明之質為未濟之主故必貞正所以獲吉憂悔乃亡故曰貞吉無悔也以文明之質居於尊位不自任察而委於二是使武以文御剛以柔故有君子之光輝也委其權于有能之人而心不疑則人皆竭其誠信功勞克濟故曰有孚吉也上九有孚于飲酒無咎濡其首有孚失是者處未濟之極即入于既濟既得濟矣任人又當心即無疑信任得人自取逸樂飲酒而已不慮危咎故曰有孚于飲酒無咎也飲酒不節樂過淫荒所以濡首之難還復及之故曰濡其首也所以濡首之難及之者良由信任于人不憂禍患失于所是故曰有孚失是
