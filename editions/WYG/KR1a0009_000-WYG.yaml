body:
  text: 提要易類周易口訣義六卷臣等謹案周易口訣義六卷唐史徴撰崇文總目曰河南史徴不詳何代人晁公武讀書志曰田氏以為魏鄭公撰誤陳振孫曰三朝史志有其書非唐則五代人避諱作證字宋史藝文志又作史文徽盖以徽徴二字相近而訛别本作史之徴則又以之文二字相近而訛耳今定為史徴從永樂大典定為唐人從朱彛尊經義考也永樂大典載徴自序云但舉宏機纂其樞要先以王注為宗後約孔疏為理故崇文總目及晁氏讀書志皆以為直抄注疏以便講習考之實不盡然如乾彖引周氏説大象引宋衷説屯彖引李氏説訟彖引周氏説師彖引陸績説六五引莊氏説謙六五引張氏說觀大象引鄭衆說賁大象引王廙說頥大象引荀爽說坎大象引莊氏說上六引虞氏說咸大象引何妥說萃彖引周𢎞正說升彖引禇氏說井大象引何妥說革彖引宋衷說鼎彖引何妥說震九四引鄭衆說漸彖引褚氏說大象引侯果說困大象引周𢎞正說兊大象引鄭衆說漸九五引陸績說諸家原書今併亡佚惟孔疏及李鼎祚周易集解間存其說是書所引則多出二家所載之外又如賁大象所引王氏說頥大象所引荀爽說雖屬集解所有而其文互異坎上六虞翻說則集解刪削過畧此所載獨詳葢唐去六朝未逺隋志所載諸家之書猶有存者故徴得以旁蒐博引今閱年數百舊籍多亡則遺文緒論無一非吉光片羽矣近時恵棟作九經古義余蕭客葺古經解鈎沈於唐以前經義卑辭隻字搜采至詳而此書所載均未之及信為難得之秘本雖其文義間涉拙滯𫝊寫亦不免訛脫而唐以前解易之書子夏𫝊既屬偽撰王應麟所輯鄭康成註姚士粦所輯陸績干寳二家註亦非完書其實存於今者京房王弼孔頴達李鼎祚四家及此書而五耳固好古者所宜寳重也自序作六卷諸家書目並同今僅闕豫随无妄大壯晉睽蹇解中孚八卦所佚無多仍編為六卷存其舊焉乾隆四十三年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序乾象既分蒼牙應運三才闡位八卦昭彰故能道濟不通人用無極自茲已降祖述多家田何𫝊于丁寛京房得之焦貢遂使異聞競起蹖駮紛多深乖述作之由全誤聖人之見若使廣求文句博引證騐浮誕日興華偽滋蔓誠謂周鼠終虧于鄭璞魚目以混于隨珠今則但舉宏機纂其樞要先以王注為宗後約孔疏為理至于卦繇六位並備而釋之彖以詳略闕而不叙大抵舉其六卷分為上下兩經直以口訣為名義決要為旨或經象未顯輒提緯以證文傳疏未明將考名以銷義遂使疑祛理悟還希述作之功學寡難周恥騰波于翰海云爾
